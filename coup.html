<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coup Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <meta charset="UTF-8">
  <title>Coup Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #1e1e2f;
      color: #fff;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      height: 100vh;
    }

    #game-header {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #2c2c3e;
      font-weight: bold;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    #players {
      background: #2a2a3a;
      padding: 10px;
      border-radius: 10px;
      overflow-y: auto;
    }

    .player {
      background: #3a3a4f;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .player.current {
      border: 2px solid gold;
    }

    .player.eliminated {
      opacity: 0.5;
    }

    #log {
      background: #2a2a3a;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
    }

    #log-messages {
      flex: 1;
      overflow-y: auto;
      margin-top: 10px;
    }

    #actions {
      background: #2c2c3e;
      padding: 10px;
    }

    .buttons,
    .reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #f39c12;
    }

    #hand {
      background: #222;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card {
      background: #444;
      padding: 12px;
      border-radius: 8px;
      min-width: 80px;
      text-align: center;
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<div id="app">

  <!-- Header -->
  <header id="game-header">
    <div>Game: ABC123</div>
    <div id="turn-indicator">Alice's turn</div>
    <div id="phase-indicator">Phase: Action</div>
  </header>

  <!-- Main content -->
  <main>
    
    <!-- Players -->
    <section id="players">
      <h2>Players</h2>

      <div class="player current">
        <div class="name">Alice 👑</div>
        <div>Coins: 5</div>
        <div class="cards">🂠 🂠</div>
      </div>

      <div class="player">
        <div class="name">Bob</div>
        <div>Coins: 2</div>
        <div class="cards">🂠</div>
      </div>

      <div class="player eliminated">
        <div class="name">Carol</div>
        <div>Coins: 0</div>
        <div class="cards">❌</div>
      </div>

    </section>

    <!-- Game log -->
    <section id="log">
      <h2>Game Log</h2>
      <div id="log-messages">
        <div>Alice takes income</div>
        <div>Bob claims Duke and takes 3 coins</div>
        <div>Alice challenges!</div>
      </div>
    </section>

  </main>

  <!-- Actions -->
  <section id="actions">
    <h2>Actions</h2>

    <div class="buttons">
      <button>Income</button>
      <button>Foreign Aid</button>
      <button>Coup</button>
      <button>Tax (Duke)</button>
      <button>Assassinate</button>
      <button>Steal</button>
      <button>Exchange</button>
    </div>

    <div class="reactions">
      <button class="secondary">Challenge</button>
      <button class="secondary">Block</button>
      <button class="secondary">Pass</button>
    </div>
  </section>

  <!-- Player hand -->
  <footer id="hand">
    <h2>Your Hand</h2>
    <div class="card">Duke</div>
    <div class="card">Assassin</div>
  </footer>

</div>

</body>

  
</html>
