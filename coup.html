<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coup Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="game-header">
    <div>Game: ABC123</div>
    <div id="turn-indicator">Alice's turn</div>
    <div id="phase-indicator">Phase: Action</div>
  </header>

  <!-- Main content -->
  <main>
    
    <!-- Players -->
    <section id="players">
      <h2>Players</h2>

      <div class="player current">
        <div class="name">Alice 👑</div>
        <div>Coins: 5</div>
        <div class="cards">🂠 🂠</div>
      </div>

      <div class="player">
        <div class="name">Bob</div>
        <div>Coins: 2</div>
        <div class="cards">🂠</div>
      </div>

      <div class="player eliminated">
        <div class="name">Carol</div>
        <div>Coins: 0</div>
        <div class="cards">❌</div>
      </div>

    </section>

    <!-- Game log -->
    <section id="log">
      <h2>Game Log</h2>
      <div id="log-messages">
        <div>Alice takes income</div>
        <div>Bob claims Duke and takes 3 coins</div>
        <div>Alice challenges!</div>
      </div>
    </section>

  </main>

  <!-- Actions -->
  <section id="actions">
    <h2>Actions</h2>

    <div class="buttons">
      <button>Income</button>
      <button>Foreign Aid</button>
      <button>Coup</button>
      <button>Tax (Duke)</button>
      <button>Assassinate</button>
      <button>Steal</button>
      <button>Exchange</button>
    </div>

    <div class="reactions">
      <button class="secondary">Challenge</button>
      <button class="secondary">Block</button>
      <button class="secondary">Pass</button>
    </div>
  </section>

  <!-- Player hand -->
  <footer id="hand">
    <h2>Your Hand</h2>
    <div class="card">Duke</div>
    <div class="card">Assassin</div>
  </footer>

</div>

</body>

  
</html>
