
<h2 class="sr-only">NowPayments supported cryptocurrencies grouped by category — searchable reference</h2>
<style>
*{box-sizing:border-box;margin:0}
.top{display:flex;gap:10px;align-items:center;padding:14px 0 10px;flex-wrap:wrap}
#search{flex:1;min-width:180px}
.cnt{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
.tabs{display:flex;flex-wrap:wrap;gap:5px;padding:0 0 14px}
.tab{font-size:12px;padding:4px 10px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);line-height:1.5}
.tab.on{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:7px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:9px 11px}
.tk{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--color-text-primary)}
.tn{font-size:11px;color:var(--color-text-secondary);margin:2px 0 5px;line-height:1.35}
.badges{display:flex;flex-wrap:wrap;gap:3px}
.b{font-size:10px;padding:1px 5px;border-radius:3px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.be{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.bb{background:var(--color-background-warning);color:var(--color-text-warning);border-color:transparent}
.bt{background:var(--color-background-danger);color:var(--color-text-danger);border-color:transparent}
.bs{background:var(--color-background-success);color:var(--color-text-success);border-color:transparent}
.none{padding:2.5rem;text-align:center;color:var(--color-text-tertiary);font-size:14px}
.sh{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;padding:14px 0 7px}
</style>

];

// dedupe
const seen=new Set();
const TOKENS=T.filter(x=>{const k=x.t+x.g;if(seen.has(k))return false;seen.add(k);return true});

let active='all';

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const filtered=TOKENS.filter(x=>{
    const gOk=active==='all'||x.g===active;
    const sOk=!q||x.n.toLowerCase().includes(q)||x.t.toLowerCase().includes(q);
    return gOk&&sOk;
  });
  document.getElementById('cnt').textContent=filtered.length+' tokens';

  if(!filtered.length){document.getElementById('out').innerHTML='<div class="none">No tokens found</div>';return}

  if(active==='all'&&!q){
    let html='';
    G.slice(1).forEach(grp=>{
      const items=filtered.filter(x=>x.g===grp.id);
      if(!items.length)return;
      html+=`<div class="sh">${grp.label} <span style="font-weight:400;color:var(--color-text-tertiary)">(${items.length})</span></div>`;
      html+='<div class="grid">'+items.map(card).join('')+'</div>';
    });
    document.getElementById('out').innerHTML=html;
  } else {
    document.getElementById('out').innerHTML='<div class="grid">'+filtered.map(card).join('')+'</div>';
  }
}

function card(x){
  const badges=x.nets.map(n=>`<span class="b ${bc(n)}">${n}</span>`).join('');
  return `<div class="card"><div class="tk">${x.t}</div><div class="tn">${x.n}</div><div class="badges">${badges}</div></div>`;
}

function buildTabs(){
  const counts={};
  TOKENS.forEach(x=>{counts[x.g]=(counts[x.g]||0)+1});
  const el=document.getElementById('tabs');
  el.innerHTML=G.map(g=>{
    const c=g.id==='all'?TOKENS.length:(counts[g.id]||0);
    return `<button class="tab${g.id===active?' on':''}" onclick="setG('${g.id}')">${g.label} <span style="opacity:.6">${c}</span></button>`;
  }).join('');
}

function setG(id){active=id;buildTabs();render()}
buildTabs();render();
</script>
