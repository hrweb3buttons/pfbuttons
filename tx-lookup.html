<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transaction &amp; Address Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --text:#e8eaf0; --text2:#8b8fa8; --text3:#565970;
    --accent:#4f8ef7; --success:#34c77b; --warning:#f5a623; --danger:#f05353;
    --token:#a78bfa; --ts:#38bdf8; --addr:#fb923c;
    --success-bg:rgba(52,199,123,0.10); --token-bg:rgba(167,139,250,0.08);
    --token-border:rgba(167,139,250,0.25); --ts-bg:rgba(56,189,248,0.07);
    --addr-bg:rgba(251,146,60,0.07); --addr-border:rgba(251,146,60,0.22);
    --radius:10px; --radius-lg:14px;
    --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
  .page { max-width:900px; margin:0 auto; }

  .header { display:flex; align-items:center; gap:14px; margin-bottom:2rem; }
  .header-icon { width:46px; height:46px; border-radius:12px; background:linear-gradient(135deg,#1c2340,#2a3060); border:1px solid rgba(79,142,247,0.3); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--accent); flex-shrink:0; }
  .header h1 { font-size:20px; font-weight:600; }
  .header p  { font-size:13px; color:var(--text2); margin-top:2px; line-height:1.5; }

  .search-row { display:flex; gap:10px; margin-bottom:10px; }
  .search-input { flex:1; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius); padding:0 14px; height:46px; font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color .15s; }
  .search-input::placeholder { color:var(--text3); }
  .search-input:focus { border-color:var(--accent); }
  .search-btn { height:46px; padding:0 22px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity .15s,transform .1s; display:flex; align-items:center; gap:6px; }
  .search-btn:hover:not(:disabled) { opacity:.88; }
  .search-btn:active:not(:disabled) { transform:scale(.97); }
  .search-btn:disabled { opacity:.45; cursor:not-allowed; }

  .hint { display:flex; align-items:flex-start; gap:8px; border-radius:8px; padding:8px 12px; font-size:12px; color:var(--text2); margin-bottom:1.25rem; line-height:1.5; border:1px solid; }
  .hint.tx-hint    { background:rgba(79,142,247,.08);  border-color:rgba(79,142,247,.2);  }
  .hint.addr-hint  { background:var(--addr-bg);        border-color:var(--addr-border);   }
  .hint i { margin-top:1px; flex-shrink:0; }
  .hint.tx-hint i  { color:var(--accent); }
  .hint.addr-hint i { color:var(--addr); }
  .hint strong { color:var(--text); font-weight:500; }

  /* mode tabs */
  .mode-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; border-radius:20px; margin-bottom:12px; }
  .mode-badge.tx-mode   { background:rgba(79,142,247,.12); color:var(--accent); border:1px solid rgba(79,142,247,.25); }
  .mode-badge.addr-mode { background:var(--addr-bg); color:var(--addr); border:1px solid var(--addr-border); }

  .chain-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:6px; margin-bottom:1.5rem; }
  .chain-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; display:flex; align-items:center; gap:8px; }
  .chain-card.found    { background:var(--success-bg);   border-color:rgba(52,199,123,.35); }
  .chain-card.inactive { opacity:.45; }
  .chain-badge { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; letter-spacing:-.03em; }
  .chain-name   { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chain-status { font-size:10px; display:flex; align-items:center; gap:3px; margin-top:1px; }
  .chain-status.idle      { color:var(--text3); }
  .chain-status.searching { color:var(--warning); }
  .chain-status.found     { color:var(--success); }
  .chain-status.not_found { color:var(--text3); }
  .chain-status.error     { color:var(--warning); }

  .results-label { font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text2); display:flex; align-items:center; gap:6px; margin-bottom:10px; }
  .results-label i { color:var(--success); }

  .result-card { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:1.1rem 1.25rem; margin-bottom:10px; }
  .result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .result-chain-info { display:flex; align-items:center; gap:11px; }
  .result-badge { width:42px; height:42px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
  .result-chain-name   { font-size:15px; font-weight:600; }
  .result-chain-sub    { font-size:12px; color:var(--text3); font-family:var(--mono); margin-top:2px; word-break:break-all; }
  .result-chain-status { font-size:12px; display:flex; align-items:center; gap:4px; margin-top:2px; }
  .result-chain-status.ok      { color:var(--success); }
  .result-chain-status.pending { color:var(--warning); }
  .explorer-link { font-size:12px; color:var(--accent); text-decoration:none; display:flex; align-items:center; gap:4px; opacity:.85; transition:opacity .15s; flex-shrink:0; }
  .explorer-link:hover { opacity:1; }

  .divider { border:none; border-top:1px solid var(--border); margin:12px 0; }

  /* timestamp banner */
  .ts-banner { display:flex; align-items:center; gap:10px; background:var(--ts-bg); border:1px solid rgba(56,189,248,.18); border-radius:8px; padding:9px 13px; margin-bottom:12px; }
  .ts-banner i { color:var(--ts); font-size:15px; flex-shrink:0; }
  .ts-banner-label { font-size:11px; color:var(--text3); }
  .ts-banner-value { font-size:13px; font-weight:600; color:var(--ts); font-family:var(--mono); }

  /* address balance banner */
  .addr-banner { display:flex; align-items:center; gap:10px; background:var(--addr-bg); border:1px solid var(--addr-border); border-radius:8px; padding:9px 13px; margin-bottom:12px; }
  .addr-banner i { color:var(--addr); font-size:18px; flex-shrink:0; }
  .addr-banner-label { font-size:11px; color:var(--text3); }
  .addr-banner-value { font-size:18px; font-weight:600; color:var(--text); }

  .fields-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:12px 20px; }
  .field-label { font-size:11px; color:var(--text3); margin-bottom:3px; }
  .field-value { font-size:13px; font-weight:500; color:var(--text); line-height:1.4; word-break:break-all; }
  .field-value.muted   { color:var(--text3); font-weight:400; }
  .field-value.privacy { color:var(--warning); font-weight:400; font-style:italic; font-size:12px; }

  .addresses-section { margin-top:2px; }
  .address-row { display:flex; gap:8px; margin-bottom:5px; flex-wrap:wrap; align-items:baseline; }
  .address-tag { font-size:11px; color:var(--text3); flex-shrink:0; min-width:22px; }
  .address-val { font-size:12px; font-family:var(--mono); color:var(--text2); word-break:break-all; }

  .token-section { margin-top:14px; }
  .token-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--token); display:flex; align-items:center; gap:5px; margin-bottom:8px; }
  .token-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; background:var(--token-bg); border:1px solid var(--token-border); border-radius:8px; padding:10px 12px; margin-bottom:6px; }
  .token-row:last-child { margin-bottom:0; }
  .token-left { display:flex; align-items:center; gap:10px; min-width:0; }
  .token-icon { width:30px; height:30px; border-radius:50%; background:rgba(167,139,250,.15); border:1.5px solid var(--token-border); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--token); flex-shrink:0; }
  .token-symbol { font-size:14px; font-weight:600; }
  .token-contract { font-size:11px; font-family:var(--mono); color:var(--text3); margin-top:1px; }
  .token-amount-col { text-align:right; flex-shrink:0; }
  .token-amount { font-size:15px; font-weight:600; font-family:var(--mono); }
  .token-amount-label { font-size:11px; color:var(--text3); margin-top:2px; }
  .token-addrs { margin-top:8px; padding-top:8px; border-top:1px solid var(--token-border); }
  .token-addr-row { display:flex; gap:6px; align-items:baseline; flex-wrap:wrap; margin-bottom:3px; }
  .token-addr-tag { font-size:10px; color:var(--text3); min-width:22px; flex-shrink:0; }
  .token-addr-val { font-size:11px; font-family:var(--mono); color:var(--text2); word-break:break-all; }

  .empty-state { text-align:center; padding:3rem 1rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); }
  .empty-state i { font-size:42px; color:var(--text3); display:block; margin-bottom:12px; }
  .empty-state h3 { font-size:15px; font-weight:500; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:var(--text2); line-height:1.6; }
  .empty-state small { font-size:12px; color:var(--text3); display:block; margin-top:6px; }
  .welcome { text-align:center; padding:3rem 1rem 2rem; color:var(--text3); }
  .welcome i { font-size:48px; display:block; margin-bottom:12px; }
  .welcome p { font-size:13px; line-height:1.7; max-width:480px; margin:0 auto; }
  .chain-strip { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1.5rem; padding:12px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
  .chain-pill { font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; border:1px solid var(--border2); color:var(--text2); background:var(--bg3); }

  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .spin { display:inline-block; animation:spin .9s linear infinite; }

  @media(max-width:600px) {
    .header h1 { font-size:17px; }
    .chain-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); }
    .search-btn span { display:none; }
    .token-row,.ts-banner { flex-wrap:wrap; }
    .token-amount-col { text-align:left; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-icon"><i class="ti ti-topology-ring-3"></i></div>
    <div>
      <h1>Transaction &amp; Address Lookup</h1>
      <p>Paste a transaction hash <em>or</em> a wallet address — 50 chains, automatic detection.</p>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" id="hashInput" type="text"
      placeholder="Paste a tx hash or wallet address…"
      autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="search-btn" id="searchBtn" disabled>
      <i class="ti ti-search"></i><span>Search</span>
    </button>
  </div>
  <div class="hint" id="hintBox" style="display:none">
    <i id="hintIcon"></i><span id="hintText"></span>
  </div>
  <div id="app"></div>
</div>

function abortIn(ms){const c=new AbortController();setTimeout(()=>c.abort(),ms);return c.signal;}
function hexCol(c,a){return c+Math.round(a*255).toString(16).padStart(2,'0');}
function truncAddr(a,f=10,b=8){if(!a||a.length<=f+b+3)return a;return`${a.slice(0,f)}…${a.slice(-b)}`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const PANAMA_DT=new Intl.DateTimeFormat('en-US',{timeZone:'America/Panama',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
const PANAMA_D =new Intl.DateTimeFormat('en-US',{timeZone:'America/Panama',weekday:'short',year:'numeric',month:'short',day:'numeric'});
const PANAMA_T =new Intl.DateTimeFormat('en-US',{timeZone:'America/Panama',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
function toPanama(secs){
  if(!secs)return null;
  try{const d=new Date(Number(secs)*1000);if(isNaN(d))return null;
    return{date:PANAMA_D.format(d),time:PANAMA_T.format(d),full:PANAMA_DT.format(d)};}
  catch{return null;}
}
function isoToSecs(s){if(!s)return null;const ms=Date.parse(s);return isNaN(ms)?null:ms/1000;}

function decodeABIString(hex){
  if(!hex||hex==='0x'||hex.length<4)return null;
  const d=hex.startsWith('0x')?hex.slice(2):hex;
  try{const off=parseInt(d.slice(0,64),16);
    if(off<d.length/2){const lp=off*2,len=parseInt(d.slice(lp,lp+64),16);
      if(len>0&&len<200){const b=new Uint8Array(d.slice(lp+64,lp+64+len*2).match(/.{2}/g).map(x=>parseInt(x,16)));
        const s=new TextDecoder().decode(b);if(/^[\x20-\x7E]+$/.test(s))return s.trim();}}}
  catch{}
  try{const b=new Uint8Array(d.match(/.{2}/g).slice(0,32).map(x=>parseInt(x,16))).filter(x=>x!==0);
    const s=new TextDecoder().decode(b);if(s.length>0&&/^[\x20-\x7E]+$/.test(s))return s.trim();}
  catch{}
  return null;
}
function formatTokenAmt(hex,dec){
  try{if(!hex||hex==='0x')return'0';
    const r=BigInt(hex),D=BigInt(dec),v=10n**D,w=r/v,f=r%v;
    if(f===0n)return w.toLocaleString();
    return`${w.toLocaleString()}.${f.toString().padStart(dec,'0').slice(0,8).replace(/0+$/,'')}`;
  }catch{return'?';}}

/* ══════════════════════════════════════════════
   INPUT TYPE DETECTION
══════════════════════════════════════════════ */
function detectInput(raw){
  const h=raw.trim();
  if(!h)return null;

  /* ── Addresses (most specific patterns first) ── */
  if(/^0x[0-9a-fA-F]{40}$/.test(h))
    return{mode:'address',addrType:'evm',icon:'ti-wallet',
      hint:'<strong>EVM wallet address</strong> — checking all 14 EVM chains for activity'};
  if(/^T[1-9A-HJ-NP-Za-km-z]{33}$/.test(h))
    return{mode:'address',addrType:'tron',icon:'ti-wallet',hint:'<strong>Tron address</strong>'};
  if(/^r[1-9A-HJ-NP-Za-km-z]{24,34}$/.test(h))
    return{mode:'address',addrType:'xrp',icon:'ti-wallet',hint:'<strong>Ripple (XRP) address</strong>'};
  if(/^G[A-Z2-7]{55}$/.test(h))
    return{mode:'address',addrType:'stellar',icon:'ti-wallet',hint:'<strong>Stellar address</strong>'};
  if(/^(tz[123]|KT1)[1-9A-HJ-NP-Za-km-z]{33}$/.test(h))
    return{mode:'address',addrType:'tezos',icon:'ti-wallet',hint:'<strong>Tezos address</strong>'};
  if(/^(nano|xrb)_[13][13456789abcdefghijkmnopqrstuwxyz]{59}$/.test(h))
    return{mode:'address',addrType:'nano',icon:'ti-wallet',hint:'<strong>Nano address</strong>'};
  if(/^addr1[a-z0-9]{50,120}$/.test(h))
    return{mode:'address',addrType:'cardano',icon:'ti-wallet',hint:'<strong>Cardano address</strong>'};
  if(/^(EQ|UQ)[A-Za-z0-9_-]{46}$/.test(h))
    return{mode:'address',addrType:'ton',icon:'ti-wallet',hint:'<strong>TON address</strong>'};
  if(/^bc1[ac-hj-np-z02-9]{6,90}$/i.test(h))
    return{mode:'address',addrType:'bitcoin',icon:'ti-wallet',hint:'<strong>Bitcoin address</strong> (bech32)'};
  if(/^ltc1[ac-hj-np-z02-9]{6,90}$/i.test(h))
    return{mode:'address',addrType:'litecoin',icon:'ti-wallet',hint:'<strong>Litecoin address</strong> (bech32)'};
  if(/^D[1-9A-HJ-NP-Za-km-z]{32,34}$/.test(h))
    return{mode:'address',addrType:'dogecoin',icon:'ti-wallet',hint:'<strong>Dogecoin address</strong>'};
  if(/^[LM][1-9A-HJ-NP-Za-km-z]{25,34}$/.test(h))
    return{mode:'address',addrType:'litecoin',icon:'ti-wallet',hint:'<strong>Litecoin address</strong>'};
  if(/^(bitcoincash:)?[qp][0-9a-z]{41}$/.test(h))
    return{mode:'address',addrType:'bch',icon:'ti-wallet',hint:'<strong>Bitcoin Cash address</strong> (cashaddr)'};
  if(/^[a-z0-9_.-]{2,64}\.(near|testnet)$/.test(h))
    return{mode:'address',addrType:'near',icon:'ti-wallet',hint:'<strong>NEAR address</strong>'};
  if(/^[48][1-9A-HJ-NP-Za-km-z]{93,105}$/.test(h))
    return{mode:'address',addrType:'monero',icon:'ti-wallet',hint:'<strong>Monero address</strong> — privacy chain, limited info'};
  // Polkadot SS58 (47-48 chars starting with 1) — check BEFORE Bitcoin legacy
  if(/^1[1-9A-HJ-NP-Za-km-z]{46,47}$/.test(h))
    return{mode:'address',addrType:'polkadot',icon:'ti-wallet',hint:'<strong>Polkadot address</strong> (SS58)'};
  // Bitcoin/BSV/BCD legacy (1 or 3, 25-34 chars)
  if(/^[13][1-9A-HJ-NP-Za-km-z]{24,34}$/.test(h))
    return{mode:'address',addrType:'bitcoin_legacy',icon:'ti-wallet',
      hint:'<strong>Bitcoin-format address</strong> — checking Bitcoin, BSV, and Bitcoin Diamond'};
  // Solana-like base58 (32-44 chars)
  if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(h))
    return{mode:'address',addrType:'solana',icon:'ti-wallet',hint:'<strong>Likely Solana address</strong>'};

  /* ── Transaction hashes ── */
  if(/^[A-Za-z0-9+/_-]{43,44}={0,2}$/.test(h)&&!/^[0-9a-fA-F]+$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Base64 format</strong> — likely TON'};
  if(h.startsWith('0x')&&h.length===66)
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>EVM tx format</strong> — Ethereum, BSC, Polygon, Tron, etc.'};
  if(/^[0-9a-fA-F]{64}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>64-char hex</strong> — Bitcoin, Litecoin, Monero, XRP, Cardano, etc.'};
  if(/^o[1-9A-HJ-NP-Za-km-z]{49,53}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Tezos operation hash</strong>'};
  if(/^[1-9A-HJ-NP-Za-km-z]{85,90}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Likely Solana transaction signature</strong>'};

  return{mode:'tx',icon:'ti-info-circle',hint:null};
}

const ERC20_TOPIC='0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';
async function fetchTokenInfo(addr,rpc){
  const call=sel=>JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:addr,data:sel},'latest']});
  const opts={method:'POST',headers:{'Content-Type':'application/json'},signal:abortIn(5000)};
  try{
    const[sr,dr]=await Promise.all([fetch(rpc,{...opts,body:call('0x95d89b41')}),fetch(rpc,{...opts,body:call('0x313ce567')})]);
    const sd=await sr.json(),dd=await dr.json();
    return{symbol:decodeABIString(sd.result)??addr.slice(0,8)+'…',decimals:dd.result&&dd.result!=='0x'?parseInt(dd.result,16):18};
  }catch{return{symbol:'???',decimals:18};}
}
async function parseEVMTokens(logs,rpc){
  if(!logs?.length)return[];
  const xfers=logs.filter(l=>l.topics?.[0]?.toLowerCase()===ERC20_TOPIC&&l.topics.length===3&&l.data&&l.data!=='0x'&&l.data.length>2);
  if(!xfers.length)return[];
  const uniq=[...new Set(xfers.map(l=>l.address.toLowerCase()))];
  const map={};
  await Promise.all(uniq.map(async a=>{map[a]=await fetchTokenInfo(a,rpc);}));
  return xfers.map(log=>{
    const ca=log.address.toLowerCase(),{symbol,decimals}=map[ca]||{symbol:'???',decimals:18};
    return{symbol,amount:formatTokenAmt(log.data,decimals),from:'0x'+log.topics[1].slice(-40),to:'0x'+log.topics[2].slice(-40),contractAddr:ca};
  });
}

async function txSolana(hash){

      tokenTransfers.push({symbol:pb.uiTokenAmount?.symbol??truncAddr(pb.mint,6,4),amount:pb.uiTokenAmount?.uiAmountString??diff.toString(),from:sender?.owner??'(unknown)',to:pb.owner??'(unknown)',contractAddr:pb.mint});}
  }

async function txEVM(hash,chain){
  const body=(m,p,i)=>JSON.stringify({jsonrpc:'2.0',id:i,method:m,params:p});
  const opts={method:'POST',headers:{'Content-Type':'application/json'},signal:abortIn(9000)};
  const[tr,rr]=await Promise.all([fetch(chain.rpc,{...opts,body:body('eth_getTransactionByHash',[hash],1)}),fetch(chain.rpc,{...opts,body:body('eth_getTransactionReceipt',[hash],2)})]);
  const td=await tr.json(),rd=await rr.json();const tx=td.result;if(!tx)return null;const rcp=rd.result;
  let blockTime=null;
  if(tx.blockNumber){try{const br=await fetch(chain.rpc,{...opts,body:body('eth_getBlockByNumber',[tx.blockNumber,false],3),signal:abortIn(6000)});
    const bd=await br.json();if(bd.result?.timestamp)blockTime=toPanama(parseInt(bd.result.timestamp,16));}catch{}}
  const rawVal=BigInt(tx.value??'0x0');
  const nativeValue=rawVal===0n?`0 ${chain.symbol}`:`${(Number(rawVal)/1e18).toFixed(6)} ${chain.symbol}`;
  let feeStr='N/A';
  if(rcp?.gasUsed&&tx.gasPrice){const fee=parseInt(rcp.gasUsed,16)*parseInt(tx.gasPrice,16);feeStr=`${(fee/1e18).toFixed(8)} ${chain.symbol}`;}
  const tokenTransfers=rcp?await parseEVMTokens(rcp.logs,chain.rpc):[];
  return{blockTime,status:rcp?(rcp.status==='0x1'?'Success':'Failed'):'Pending',
    blockNumber:tx.blockNumber?parseInt(tx.blockNumber,16).toLocaleString():'Pending',
    from:tx.from,to:tx.to??'Contract creation',nativeValue,fee:feeStr,
    gasLimit:parseInt(tx.gas,16).toLocaleString(),gasUsed:rcp?.gasUsed?parseInt(rcp.gasUsed,16).toLocaleString():'N/A',
    explorerUrl:chain.explorer+hash,confirmed:rcp?.status==='0x1',tokenTransfers};
}

    const isPrivacy=String(r.nativeValue||'').includes('Hidden');
    const mainF=Object.entries(r).filter(([k])=>!HIDE_FIELDS.has(k)&&!MONO_FIELDS.has(k)&&k!=='nativeValue');
    const allF=r.nativeValue?[['nativeValue',r.nativeValue],...mainF]:mainF;
    const addrF=Object.entries(r).filter(([k])=>MONO_FIELDS.has(k));
    return`<div class="result-card">
      <div class="result-header">
        <div class="result-chain-info">
          <div class="result-badge" style="background:${hexCol(c.color,.12)};border:2px solid ${c.color};color:${c.color}">
            ${c.symbol.length>4?c.symbol.slice(0,4):c.symbol}</div>
          <div><div class="result-chain-name">${c.name}</div>
            <div class="result-chain-status ${r.confirmed?'ok':'pending'}">
              <i class="ti ${r.confirmed?'ti-circle-check':'ti-clock'}"></i>
              ${r.confirmed?'Confirmed':'Pending / Unconfirmed'}</div>
          </div>
        </div>
        ${r.explorerUrl?`<a class="explorer-link" href="${escHtml(r.explorerUrl)}" target="_blank" rel="noopener">Explorer <i class="ti ti-external-link"></i></a>`:''}
      </div>
      ${renderTimestamp(r.blockTime)}
      ${renderTokenTransfers(tt)}
      <div class="fields-grid" style="${hasT?'margin-top:14px':''}">
        ${allF.map(([k,v])=>`<div><div class="field-label">${FIELD_LABELS[k]??k}</div>
          <div class="field-value${k==='nativeValue'&&nativeMoot?' muted':k==='nativeValue'&&isPrivacy?' privacy':''}">${escHtml(String(v))}</div>
        </div>`).join('')}
      </div>
      ${addrF.length?`<div class="addresses-section"><hr class="divider"/>
        <div class="field-label" style="margin-bottom:8px">Addresses</div>
        ${addrF.map(([k,v])=>`<div class="address-row"><span class="address-tag">${FIELD_LABELS[k]??k}</span>
          <span class="address-val">${escHtml(String(v))}</span></div>`).join('')}
      </div>`:''}
    </div>`;
  }).join('')}`;
}

function renderAddrCards(){
  const found=activeChains.filter(c=>statuses[c.id]==='found');
  if(!found.length)return'';
  return`<div class="results-label"><i class="ti ti-wallet"></i>
    Address active on ${found.length} chain${found.length>1?'s':''}: ${found.map(c=>c.name).join(' · ')}
  </div>
  ${found.map(c=>{
    const r=results[c.id];if(!r)return'';
    const extras=Object.entries(r).filter(([k])=>!ADDR_HIDE.has(k));
    return`<div class="result-card">
      <div class="result-header">
        <div class="result-chain-info">
          <div class="result-badge" style="background:${hexCol(c.color,.12)};border:2px solid ${c.color};color:${c.color}">
            ${c.symbol.length>4?c.symbol.slice(0,4):c.symbol}</div>
          <div><div class="result-chain-name">${c.name}</div>
            <div class="result-chain-sub">${truncAddr(currentInput,14,10)}</div>
          </div>
        </div>
        ${r.explorerUrl?`<a class="explorer-link" href="${escHtml(r.explorerUrl)}" target="_blank" rel="noopener">Explorer <i class="ti ti-external-link"></i></a>`:''}
      </div>
      <div class="addr-banner">
        <i class="ti ti-coin"></i>
        <div><div class="addr-banner-label">Balance</div>
          <div class="addr-banner-value">${escHtml(String(r.balance))}</div></div>
      </div>
      <div class="fields-grid">
        <div><div class="field-label">Transactions</div>
          <div class="field-value">${escHtml(String(r.txCount))}</div></div>
        ${r.totalReceived?`<div><div class="field-label">Total received</div><div class="field-value">${escHtml(String(r.totalReceived))}</div></div>`:''}
        ${r.totalSent?`<div><div class="field-label">Total sent</div><div class="field-value">${escHtml(String(r.totalSent))}</div></div>`:''}
        ${extras.map(([k,v])=>`<div><div class="field-label">${FIELD_LABELS[k]??k}</div><div class="field-value">${escHtml(String(v))}</div></div>`).join('')}
      </div>
      <div class="addresses-section"><hr class="divider"/>
        <div class="field-label" style="margin-bottom:6px">Full address</div>
        <div class="address-val" style="font-size:12px">${escHtml(currentInput)}</div>
      </div>
    </div>`;
  }).join('')}`;
}

function renderEmpty(){
  const allDone=activeChains.every(c=>statuses[c.id]!=='searching');
  const anyFound=activeChains.some(c=>statuses[c.id]==='found');
  if(!allDone||anyFound)return'';
  const isAddr=appMode==='address';
  return`<div class="empty-state">
    <i class="ti ${isAddr?'ti-wallet-off':'ti-search-off'}"></i>
    <h3>${isAddr?'No activity found':'No match found'}</h3>
    <p>${isAddr
      ?`This address has no recorded activity on any of the ${activeChains.length} chain${activeChains.length>1?'s':''} checked.`
      :`This hash was not found on any of the ${activeChains.length} supported chains.`}
    </p>
    <small>Some APIs may have been temporarily unavailable — try again if you expected a result.</small>
  </div>`;
}

function renderWelcome(){
  return`<div class="welcome">
    <i class="ti ti-topology-star-ring-3" style="color:var(--text3)"></i>
    <p>Paste a <strong style="color:var(--text2)">transaction hash</strong> or a <strong style="color:var(--addr)">wallet address</strong> — the tool automatically detects which it is and searches the right chains.</p>
  </div>
  <div class="chain-strip">${CHAINS.map(c=>`<span class="chain-pill" style="border-color:${hexCol(c.color,.35)};color:${c.color}">${c.name}</span>`).join('')}</div>`;
}

function render(){
  const app=document.getElementById('app');
  if(appMode==='idle'){app.innerHTML=renderWelcome();return;}
  const modeBadge=appMode==='address'
    ?`<div class="mode-badge addr-mode"><i class="ti ti-wallet"></i> Address lookup</div>`
    :`<div class="mode-badge tx-mode"><i class="ti ti-arrows-exchange"></i> Transaction lookup</div>`;
  const grid=renderChainGrid();
  const cards=appMode==='address'?renderAddrCards():renderTxCards();
  app.innerHTML=modeBadge+grid+cards+renderEmpty();
}

/* ══════════════════════════════════════════════
   EVENT WIRING
══════════════════════════════════════════════ */
const hashInput=document.getElementById('hashInput');
const searchBtn=document.getElementById('searchBtn');
const hintBox=document.getElementById('hintBox');
const hintIcon=document.getElementById('hintIcon');
const hintText=document.getElementById('hintText');

hashInput.addEventListener('input',()=>{
  const h=hashInput.value.trim();
  searchBtn.disabled=!h||searching;
  const det=h?detectInput(h):null;
  if(det?.hint){
    hintBox.className=`hint ${det.mode==='address'?'addr-hint':'tx-hint'}`;
    hintIcon.className=`ti ${det.icon}`;
    hintText.innerHTML=det.hint;
    hintBox.style.display='flex';
  }else{hintBox.style.display='none';}
});
hashInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchBtn.click();});

searchBtn.addEventListener('click',async()=>{
  const input=hashInput.value.trim();
  if(!input||searching)return;
  searching=true;searchBtn.disabled=true;
  searchBtn.innerHTML=`<i class="ti ti-loader-2 spin"></i> <span>Searching…</span>`;
  statuses={};results={};currentInput=input;

  const det=detectInput(input);
  if(det?.mode==='address'){
    await runAddrSearch(input,det.addrType);
  }else{
    await runTxSearch(input);
  }

  searching=false;searchBtn.disabled=false;
  searchBtn.innerHTML=`<i class="ti ti-search"></i> <span>Search</span>`;
  render();
});

render();
</script>
</body>
</html>
