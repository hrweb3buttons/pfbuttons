<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transaction Hash Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --text:#e8eaf0; --text2:#8b8fa8; --text3:#565970;
    --accent:#4f8ef7; --success:#34c77b; --warning:#f5a623; --danger:#f05353;
    --token:#a78bfa; --ts:#38bdf8;
    --success-bg:rgba(52,199,123,0.10); --token-bg:rgba(167,139,250,0.08);
    --token-border:rgba(167,139,250,0.25); --ts-bg:rgba(56,189,248,0.07);
    --radius:10px; --radius-lg:14px;
    --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
  .page { max-width:900px; margin:0 auto; }

  /* Header */
  .header { display:flex; align-items:center; gap:14px; margin-bottom:2rem; }
  .header-icon { width:46px; height:46px; border-radius:12px; background:linear-gradient(135deg,#1c2340,#2a3060); border:1px solid rgba(79,142,247,0.3); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--accent); flex-shrink:0; }
  .header h1 { font-size:20px; font-weight:600; color:var(--text); }
  .header p  { font-size:13px; color:var(--text2); margin-top:2px; line-height:1.5; }

  /* Search */
  .search-row { display:flex; gap:10px; margin-bottom:10px; }
  .search-input { flex:1; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius); padding:0 14px; height:46px; font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color 0.15s; }
  .search-input::placeholder { color:var(--text3); }
  .search-input:focus { border-color:var(--accent); }
  .search-btn { height:46px; padding:0 22px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity 0.15s,transform 0.1s; display:flex; align-items:center; gap:6px; }
  .search-btn:hover:not(:disabled) { opacity:0.88; }
  .search-btn:active:not(:disabled) { transform:scale(0.97); }
  .search-btn:disabled { opacity:0.45; cursor:not-allowed; }

  /* Hint */
  .hint { display:flex; align-items:flex-start; gap:8px; background:rgba(79,142,247,0.08); border:1px solid rgba(79,142,247,0.2); border-radius:8px; padding:8px 12px; font-size:12px; color:var(--text2); margin-bottom:1.25rem; line-height:1.5; }
  .hint i { color:var(--accent); margin-top:1px; flex-shrink:0; }
  .hint strong { color:var(--text); font-weight:500; }

  /* Chain grid */
  .chain-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:6px; margin-bottom:1.5rem; }
  .chain-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; display:flex; align-items:center; gap:8px; transition:border-color 0.2s,background 0.2s; }
  .chain-card.found { background:var(--success-bg); border-color:rgba(52,199,123,0.35); }
  .chain-badge { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; letter-spacing:-0.03em; }
  .chain-name   { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chain-status { font-size:10px; display:flex; align-items:center; gap:3px; margin-top:1px; }
  .chain-status.idle      { color:var(--text3); }
  .chain-status.searching { color:var(--warning); }
  .chain-status.found     { color:var(--success); }
  .chain-status.not_found { color:var(--text3); }
  .chain-status.error     { color:var(--warning); }

  /* Result cards */
  .results-label { font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text2); display:flex; align-items:center; gap:6px; margin-bottom:10px; }
  .results-label i { color:var(--success); }
  .result-card { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:1.1rem 1.25rem; margin-bottom:10px; }
  .result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .result-chain-info { display:flex; align-items:center; gap:11px; }
  .result-badge { width:42px; height:42px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; letter-spacing:-0.01em; }
  .result-chain-name   { font-size:15px; font-weight:600; color:var(--text); }
  .result-chain-status { font-size:12px; display:flex; align-items:center; gap:4px; margin-top:2px; }
  .result-chain-status.ok      { color:var(--success); }
  .result-chain-status.pending { color:var(--warning); }
  .explorer-link { font-size:12px; color:var(--accent); text-decoration:none; display:flex; align-items:center; gap:4px; opacity:0.85; transition:opacity 0.15s; }
  .explorer-link:hover { opacity:1; }
  .divider { border:none; border-top:1px solid var(--border); margin:12px 0; }

  /* ── Timestamp banner ── */
  .ts-banner {
    display: flex; align-items: center; gap: 10px;
    background: var(--ts-bg);
    border: 1px solid rgba(56,189,248,0.18);
    border-radius: 8px;
    padding: 9px 13px;
    margin-bottom: 12px;
  }
  .ts-banner i { color: var(--ts); font-size: 15px; flex-shrink: 0; }
  .ts-banner-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .ts-banner-value { font-size: 13px; font-weight: 600; color: var(--ts); font-family: var(--mono); }
  .ts-banner-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* Fields grid */
  .fields-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:12px 20px; }
  .field-label { font-size:11px; color:var(--text3); margin-bottom:3px; }
  .field-value { font-size:13px; font-weight:500; color:var(--text); line-height:1.4; word-break:break-all; }
  .field-value.muted { color:var(--text3); font-weight:400; }
  .field-value.privacy { color:var(--warning); font-weight:400; font-style:italic; font-size:12px; }

  /* Address rows */
  .addresses-section { margin-top:2px; }
  .address-row { display:flex; gap:8px; margin-bottom:5px; flex-wrap:wrap; align-items:baseline; }
  .address-tag { font-size:11px; color:var(--text3); flex-shrink:0; min-width:22px; }
  .address-val { font-size:12px; font-family:var(--mono); color:var(--text2); word-break:break-all; }

  /* Token transfers */
  .token-section { margin-top:14px; }
  .token-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--token); display:flex; align-items:center; gap:5px; margin-bottom:8px; }
  .token-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; background:var(--token-bg); border:1px solid var(--token-border); border-radius:8px; padding:10px 12px; margin-bottom:6px; }
  .token-row:last-child { margin-bottom:0; }
  .token-left { display:flex; align-items:center; gap:10px; min-width:0; }
  .token-icon { width:30px; height:30px; border-radius:50%; background:rgba(167,139,250,0.15); border:1.5px solid var(--token-border); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--token); flex-shrink:0; letter-spacing:-0.02em; }
  .token-symbol { font-size:14px; font-weight:600; color:var(--text); }
  .token-contract { font-size:11px; font-family:var(--mono); color:var(--text3); margin-top:1px; }
  .token-amount-col { text-align:right; flex-shrink:0; }
  .token-amount { font-size:15px; font-weight:600; color:var(--text); font-family:var(--mono); }
  .token-amount-label { font-size:11px; color:var(--text3); margin-top:2px; }
  .token-addrs { margin-top:8px; padding-top:8px; border-top:1px solid var(--token-border); }
  .token-addr-row { display:flex; gap:6px; align-items:baseline; flex-wrap:wrap; margin-bottom:3px; }
  .token-addr-row:last-child { margin-bottom:0; }
  .token-addr-tag { font-size:10px; color:var(--text3); min-width:22px; flex-shrink:0; }
  .token-addr-val { font-size:11px; font-family:var(--mono); color:var(--text2); word-break:break-all; }

  /* Empty / Welcome */
  .empty-state { text-align:center; padding:3rem 1rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); }
  .empty-state i { font-size:42px; color:var(--text3); display:block; margin-bottom:12px; }
  .empty-state h3 { font-size:15px; font-weight:500; color:var(--text); margin-bottom:6px; }
  .empty-state p { font-size:13px; color:var(--text2); line-height:1.6; }
  .empty-state small { font-size:12px; color:var(--text3); display:block; margin-top:6px; }
  .welcome { text-align:center; padding:3rem 1rem 2rem; color:var(--text3); }
  .welcome i { font-size:48px; display:block; margin-bottom:12px; }
  .welcome p { font-size:13px; line-height:1.7; max-width:460px; margin:0 auto; }
  .chain-strip { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1.5rem; padding:12px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
  .chain-pill { font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; border:1px solid var(--border2); color:var(--text2); background:var(--bg3); }

  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin { display:inline-block; animation:spin 0.9s linear infinite; }

  @media(max-width:600px) {
    .header h1 { font-size:17px; }
    .chain-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); }
    .search-btn span { display:none; }
    .token-row { flex-direction:column; }
    .token-amount-col { text-align:left; }
    .ts-banner { flex-wrap:wrap; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-icon"><i class="ti ti-topology-ring-3"></i></div>
    <div>
      <h1>Transaction Hash Lookup</h1>
      <p>Search 30 blockchains simultaneously — chain, timestamp, native amounts, and token transfers.</p>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" id="hashInput" type="text"
      placeholder="Paste transaction hash (0x…, 64-char hex, base58, base64…)"
      autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="search-btn" id="searchBtn" disabled>
      <i class="ti ti-search"></i><span>Search</span>
    </button>
  </div>
  <div class="hint" id="hintBox" style="display:none">
    <i class="ti ti-info-circle"></i><span id="hintText"></span>
  </div>
  <div id="app"></div>
</div>

<script>
/* ════════════════════════════════════════════
   CHAIN DEFINITIONS
════════════════════════════════════════════ */
const CHAINS = [

  { id:"bsc",       name:"BNB Chain",        symbol:"BNB",  color:"#F0B90B", type:"evm", rpc:"https://bsc.publicnode.com",                   explorer:"https://bscscan.com/tx/" },
  { id:"polygon",   name:"Polygon",          symbol:"POL",  color:"#7B3FE4", type:"evm", rpc:"https://polygon-bor.publicnode.com",           explorer:"https://polygonscan.com/tx/" },
  { id:"arbitrum",  name:"Arbitrum",         symbol:"ARB",  color:"#28A0F0", type:"evm", rpc:"https://arbitrum-one.publicnode.com",          explorer:"https://arbiscan.io/tx/" },
  { id:"optimism",  name:"Optimism",         symbol:"OP",   color:"#FF0420", type:"evm", rpc:"https://optimism.publicnode.com",              explorer:"https://optimistic.etherscan.io/tx/" },
  { id:"base",      name:"Base",             symbol:"BASE", color:"#0052FF", type:"evm", rpc:"https://base.publicnode.com",                  explorer:"https://basescan.org/tx/" },
  { id:"avalanche", name:"Avalanche C",      symbol:"AVAX", color:"#E84142", type:"evm", rpc:"https://avalanche-c-chain.publicnode.com",     explorer:"https://snowtrace.io/tx/" },
  { id:"fantom",    name:"Fantom",           symbol:"FTM",  color:"#1969FF", type:"evm", rpc:"https://rpc.ankr.com/fantom",                 explorer:"https://ftmscan.com/tx/" },
  { id:"cronos",    name:"Cronos",           symbol:"CRO",  color:"#002D74", type:"evm", rpc:"https://evm.cronos.org",                      explorer:"https://cronoscan.com/tx/" },
  { id:"etc",       name:"Ethereum Classic", symbol:"ETC",  color:"#328432", type:"evm", rpc:"https://rpc.ankr.com/eth_classic",             explorer:"https://etc.blockscout.com/tx/" },
  { id:"opbnb",     name:"opBNB",            symbol:"BNB",  color:"#F0B90B", type:"evm", rpc:"https://opbnb.publicnode.com",                explorer:"https://opbnb.bscscan.com/tx/" },
  { id:"celo",      name:"CELO",             symbol:"CELO", color:"#35D07F", type:"evm", rpc:"https://forno.celo.org",                      explorer:"https://celoscan.io/tx/" },
  { id:"kava",      name:"KAVA",             symbol:"KAVA", color:"#FF433E", type:"evm", rpc:"https://evm.kava.io",                         explorer:"https://kavascan.com/tx/" },

const FIELD_LABELS = {
  blockHeight:"Block height", blockNumber:"Block number",
  confirmations:"Confirmations", fee:"Fee", nativeValue:"Native amount",
  inputs:"Inputs", outputs:"Outputs", size:"Size",
  slot:"Slot", signers:"Accounts", status:"Status", type:"Type",
  from:"From", to:"To", gasLimit:"Gas limit", gasUsed:"Gas used",
  ledger:"Ledger", operations:"Operations", module:"Call",
};
const MONO_FIELDS = new Set(["from","to"]);
const HIDE_FIELDS = new Set(["explorerUrl","confirmed","tokenTransfers","value","blockTime","_tsRaw"]);

const STATUS_CFG = {
  idle:      { icon:"ti-circle",       cls:"idle",      label:"Ready" },
  searching: { icon:"ti-loader-2",     cls:"searching", label:"Searching…" },
  found:     { icon:"ti-circle-check", cls:"found",     label:"Found" },
  not_found: { icon:"ti-circle-x",     cls:"not_found", label:"Not found" },
  error:     { icon:"ti-alert-circle", cls:"error",     label:"Unavailable" },
};

let statuses={}, results={}, searching=false;

/* ════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════ */
function abortIn(ms){ const c=new AbortController(); setTimeout(()=>c.abort(),ms); return c.signal; }
function hexCol(color,alpha){ return color+Math.round(alpha*255).toString(16).padStart(2,'0'); }
function truncAddr(a,f=10,b=8){ if(!a||a.length<=f+b+3)return a; return `${a.slice(0,f)}…${a.slice(-b)}`; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* Panama time — UTC-5, no DST ever */
const PANAMA_FMT = new Intl.DateTimeFormat('en-US', {
  timeZone:    'America/Panama',
  year:        'numeric', month: 'short', day:   'numeric',
  hour:        '2-digit', minute:'2-digit',second:'2-digit',
  hour12:      true,
});
const PANAMA_DATE_FMT = new Intl.DateTimeFormat('en-US', {
  timeZone: 'America/Panama',
  weekday: 'short', year:'numeric', month:'short', day:'numeric',
});
const PANAMA_TIME_FMT = new Intl.DateTimeFormat('en-US', {
  timeZone: 'America/Panama',
  hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true,
});

/**
 * Convert a Unix timestamp (seconds) to a { dateStr, timeStr, full } object
 * formatted in Panama time (UTC-5).
 * Returns null if secs is falsy/invalid.
 */
function toPanama(secs) {
  if (!secs) return null;
  try {
    const ms  = typeof secs === 'number' ? secs * 1000 : Number(secs) * 1000;
    const d   = new Date(ms);
    if (isNaN(d.getTime())) return null;
    return {
      date: PANAMA_DATE_FMT.format(d),
      time: PANAMA_TIME_FMT.format(d),
      full: PANAMA_FMT.format(d),
    };
  } catch { return null; }
}

/** Parse an ISO-8601 string into Unix seconds */
function isoToSecs(iso) {
  if (!iso) return null;
  const ms = Date.parse(iso);
  return isNaN(ms) ? null : ms / 1000;
}

function decodeABIString(hex){
  if(!hex||hex==='0x'||hex.length<4)return null;
  const data=hex.startsWith('0x')?hex.slice(2):hex;
  try{
    const off=parseInt(data.slice(0,64),16);
    if(off<data.length/2){
      const lp=off*2, len=parseInt(data.slice(lp,lp+64),16);
      if(len>0&&len<200){
        const sh=data.slice(lp+64,lp+64+len*2);
        const bytes=new Uint8Array(sh.match(/.{2}/g).map(b=>parseInt(b,16)));
        const str=new TextDecoder().decode(bytes);
        if(/^[\x20-\x7E]+$/.test(str))return str.trim();
      }
    }
  }catch{}
  try{
    const bytes=new Uint8Array(data.match(/.{2}/g).slice(0,32).map(b=>parseInt(b,16))).filter(b=>b!==0);
    const str=new TextDecoder().decode(bytes);
    if(str.length>0&&/^[\x20-\x7E]+$/.test(str))return str.trim();
  }catch{}
  return null;
}

function formatTokenAmt(rawHex,decimals){
  try{
    if(!rawHex||rawHex==='0x')return '0';
    const raw=BigInt(rawHex), dec=BigInt(decimals), div=10n**dec;
    const whole=raw/div, frac=raw%div;
    if(frac===0n)return whole.toLocaleString();
    const fs=frac.toString().padStart(decimals,'0').slice(0,8).replace(/0+$/,'');
    return `${whole.toLocaleString()}.${fs}`;
  }catch{return '?';}
}

/* ════════════════════════════════════════════
   EVM TOKEN HELPERS
════════════════════════════════════════════ */
const ERC20_TOPIC='0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';

async function fetchTokenInfo(addr,rpc){
  const call=sel=>JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:addr,data:sel},'latest']});
  const opts={method:'POST',headers:{'Content-Type':'application/json'},signal:abortIn(5000)};
  try{
    const [sr,dr]=await Promise.all([
      fetch(rpc,{...opts,body:call('0x95d89b41')}),
      fetch(rpc,{...opts,body:call('0x313ce567')}),
    ]);
    const sd=await sr.json(), dd=await dr.json();
    const symbol=decodeABIString(sd.result)??addr.slice(0,8)+'…';
    const decimals=dd.result&&dd.result!=='0x'?parseInt(dd.result,16):18;
    return{symbol,decimals};
  }catch{return{symbol:'???',decimals:18};}
}

async function parseEVMTokenTransfers(logs,rpc){
  if(!logs?.length)return[];
  const xfers=logs.filter(l=>l.topics?.[0]?.toLowerCase()===ERC20_TOPIC&&l.topics.length===3&&l.data&&l.data!=='0x'&&l.data.length>2);
  if(!xfers.length)return[];
  const uniq=[...new Set(xfers.map(l=>l.address.toLowerCase()))];
  const infoMap={};
  await Promise.all(uniq.map(async a=>{infoMap[a]=await fetchTokenInfo(a,rpc);}));
  return xfers.map(log=>{
    const ca=log.address.toLowerCase();
    const{symbol,decimals}=infoMap[ca]||{symbol:'???',decimals:18};

  });
}

/* ════════════════════════════════════════════
   FETCH — RIPPLE / XRP
   XRP epoch = Jan 1, 2000 00:00:00 UTC = Unix 946684800
════════════════════════════════════════════ */
const XRP_EPOCH_OFFSET = 946684800;
async function fetchXRP(hash){
  const r=await fetch('https://xrplcluster.com/',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({method:'tx',params:[{transaction:hash,binary:false}]}),
    signal:abortIn(9000),
  });
  const d=await r.json();
  const res=d.result; if(!res||res.error||(!res.validated&&!res.TransactionType))return null;
  const fee=parseInt(res.Fee||'0');
  const tokenTransfers=[];
  let nativeValue='0 XRP';
  if(typeof res.Amount==='string'){
    nativeValue=`${(parseInt(res.Amount)/1e6).toFixed(6)} XRP`;
  }else if(res.Amount&&typeof res.Amount==='object'){
    tokenTransfers.push({symbol:res.Amount.currency,amount:res.Amount.value,
      from:res.Account,to:res.Destination??'?',contractAddr:res.Amount.issuer??''});
  }
  // res.date is seconds since XRP epoch
  const unixSecs = res.date ? res.date + XRP_EPOCH_OFFSET : null;
  return{
    blockTime:toPanama(unixSecs),
    status:res.meta?.TransactionResult??'Unknown',
    blockNumber:res.ledger_index??'N/A',
    from:res.Account, nativeValue,
    fee:`${(fee/1e6).toFixed(6)} XRP`,
    explorerUrl:`https://livenet.xrpl.org/transactions/${hash}`,
    confirmed:res.validated===true, tokenTransfers,
  };
}

    headers:{Accept:'application/json'},signal:abortIn(10000),
  });

  const s=tx.outcomes?.status??'';
  // block_timestamp in nanoseconds → seconds
  const ts = tx.block_timestamp ? Math.floor(parseInt(tx.block_timestamp)/1e9) : null;
  return{
    blockTime:toPanama(ts),
    blockHeight:tx.block?.block_height??'N/A',

/* ════════════════════════════════════════════
   FETCH — TRON
════════════════════════════════════════════ */
async function fetchTron(hash){
  const opts={headers:{Accept:'application/json'},signal:abortIn(9000)};
  const [txRes,evRes]=await Promise.allSettled([
    fetch(`https://api.trongrid.io/v1/transactions/${hash}`,opts),
    fetch(`https://api.trongrid.io/v1/transactions/${hash}/events`,opts),
  ]);
  if(txRes.status==='rejected')return null;
  const txData=await txRes.value.json();
  if(!txData.data?.length)return null;
  const tx=txData.data[0];
  const ret=tx.ret?.[0]?.contractRet??'Unknown';
  // raw_data.timestamp is in milliseconds
  const ts = tx.raw_data?.timestamp ? Math.floor(tx.raw_data.timestamp/1000) : null;
  const result={
    blockTime:toPanama(ts),
    status:ret, blockNumber:tx.blockNumber??'N/A',
    fee:tx.fee!=null?`${(tx.fee/1e6).toFixed(6)} TRX`:'0 TRX',
    nativeValue:tx.raw_data?.contract?.[0]?.parameter?.value?.amount!=null
      ?`${(tx.raw_data.contract[0].parameter.value.amount/1e6).toFixed(6)} TRX`:'0 TRX',
    from:tx.raw_data?.contract?.[0]?.parameter?.value?.owner_address??'N/A',
    explorerUrl:`https://tronscan.org/#/transaction/${hash}`,
    confirmed:ret==='SUCCESS', tokenTransfers:[],
  };
  if(evRes.status==='fulfilled'&&evRes.value.ok){
    try{
      const ev=await evRes.value.json();
      for(const e of(ev.data??[])){
        if(e.event_name!=='Transfer')continue;
        const r2=e.result??{},info=e.token_info??{};
        const raw=r2._value??r2.value??'0', dec=info.decimals??6;
        let amt; try{amt=formatTokenAmt('0x'+BigInt(raw).toString(16),dec);}catch{amt=raw;}
        result.tokenTransfers.push({symbol:info.symbol??'TRC-20',amount:amt,
          from:r2._from??r2.from??'?',to:r2._to??r2.to??'?',contractAddr:e.contract_address??''});
      }
    }catch{}
  }
  return result;
}

/* ════════════════════════════════════════════
   FETCH — SOLANA
════════════════════════════════════════════ */
async function fetchSolana(hash){
  const r=await fetch('https://api.mainnet-beta.solana.com',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getTransaction',
      params:[hash,{encoding:'json',maxSupportedTransactionVersion:0}]}),
    signal:abortIn(12000),
  });
  const d=await r.json(); if(!d.result)return null;
  const tx=d.result;
  const pre=tx.meta?.preTokenBalances??[], post=tx.meta?.postTokenBalances??[];
  const tokenTransfers=[];
  for(const pb of post){
    const pr=pre.find(p=>p.accountIndex===pb.accountIndex&&p.mint===pb.mint);
    const preAmt=pr?.uiTokenAmount?.uiAmount??0, postAmt=pb.uiTokenAmount?.uiAmount??0, diff=postAmt-preAmt;
    if(diff>0){
      const sender=post.find(p=>p.mint===pb.mint&&p.accountIndex!==pb.accountIndex&&
        ((pre.find(pp=>pp.accountIndex===p.accountIndex&&pp.mint===p.mint)?.uiTokenAmount?.uiAmount??0)-(p.uiTokenAmount?.uiAmount??0))>0);
      tokenTransfers.push({symbol:pb.uiTokenAmount?.symbol??truncAddr(pb.mint,6,4),
        amount:pb.uiTokenAmount?.uiAmountString??diff.toString(),
        from:sender?.owner??'(unknown)',to:pb.owner??'(unknown)',contractAddr:pb.mint});
    }
  }
  return{
    blockTime:toPanama(tx.blockTime),   // blockTime is already Unix seconds in Solana RPC
    slot:tx.slot,
    fee:`${((tx.meta?.fee??0)/1e9).toFixed(6)} SOL`,
    signers:tx.transaction?.message?.accountKeys?.length??'N/A',
    explorerUrl:`https://solscan.io/tx/${hash}`,
    confirmed:tx.meta?.err===null, tokenTransfers,
  };
}

/* ════════════════════════════════════════════
   FETCH — EVM
   Needs eth_getBlockByNumber to get timestamp.
════════════════════════════════════════════ */
async function fetchEVM(hash,chain){
  const rpcBody=(m,p,i)=>JSON.stringify({jsonrpc:'2.0',id:i,method:m,params:p});
  const opts={method:'POST',headers:{'Content-Type':'application/json'},signal:abortIn(9000)};

  const [tr,rr]=await Promise.all([
    fetch(chain.rpc,{...opts,body:rpcBody('eth_getTransactionByHash',[hash],1)}),
    fetch(chain.rpc,{...opts,body:rpcBody('eth_getTransactionReceipt',[hash],2)}),
  ]);
  const td=await tr.json(), rd=await rr.json();
  const tx=td.result; if(!tx)return null;
  const rcp=rd.result;

  // Fetch block to get timestamp (parallel, non-blocking for the rest)
  let blockTime=null;
  if(tx.blockNumber){
    try{
      const br=await fetch(chain.rpc,{...opts,
        body:rpcBody('eth_getBlockByNumber',[tx.blockNumber,false],3),signal:abortIn(6000)});
      const bd=await br.json();
      if(bd.result?.timestamp) blockTime=toPanama(parseInt(bd.result.timestamp,16));
    }catch{}
  }

  const rawVal=BigInt(tx.value??'0x0');
  const nativeValue=rawVal===0n?`0 ${chain.symbol}`:`${(Number(rawVal)/1e18).toFixed(6)} ${chain.symbol}`;
  let feeStr='N/A';
  if(rcp?.gasUsed&&tx.gasPrice){
    const fee=parseInt(rcp.gasUsed,16)*parseInt(tx.gasPrice,16);
    feeStr=`${(fee/1e18).toFixed(8)} ${chain.symbol}`;
  }
  const tokenTransfers=rcp?await parseEVMTokenTransfers(rcp.logs,chain.rpc):[];
  return{
    blockTime,
    status:rcp?(rcp.status==='0x1'?'Success':'Failed'):'Pending',
    blockNumber:tx.blockNumber?parseInt(tx.blockNumber,16).toLocaleString():'Pending',
    from:tx.from, to:tx.to??'Contract creation',
    nativeValue, fee:feeStr,
    gasLimit:parseInt(tx.gas,16).toLocaleString(),
    gasUsed:rcp?.gasUsed?parseInt(rcp.gasUsed,16).toLocaleString():'N/A',
    explorerUrl:chain.explorer+hash,
    confirmed:rcp?.status==='0x1', tokenTransfers,
  };
}

/* ════════════════════════════════════════════
   MASTER DISPATCHER
════════════════════════════════════════════ */
async function searchChain(chain,hash){
  switch(chain.type){
    case'bitcoin':    return fetchBitcoin(hash);
    case'blockcypher':return fetchBlockcypher(hash,chain);
    case'bsv':        return fetchBSV(hash);
    case'bcd':        return fetchBCD(hash);
    case'xrp':        return fetchXRP(hash);
    case'cardano':    return fetchCardano(hash);
    case'ton':        return fetchTON(hash);
    case'nano':       return fetchNano(hash);
    case'monero':     return fetchMonero(hash);
    case'stellar':    return fetchStellar(hash);
    case'tezos':      return fetchTezos(hash);
    case'polkadot':   return fetchPolkadot(hash);
    case'near':       return fetchNEAR(hash);
    case'tron':       return fetchTron(hash);
    case'solana':     return fetchSolana(hash);
    case'evm':        return fetchEVM(hash,chain);
    default:          return null;
  }
}

/* ════════════════════════════════════════════
   HASH HINT
════════════════════════════════════════════ */
function hashHint(h){
  if(/^[A-Za-z0-9+/_-]{43,44}={0,2}$/.test(h)&&!/^[0-9a-fA-F]+$/.test(h))
    return{label:'Base64 / Base64url format',chains:'TON'};
  if(h.startsWith('0x')&&h.length===66)
    return{label:'EVM format (0x + 64 hex)',chains:'Ethereum, BSC, Polygon, Arbitrum, Optimism, Base, Avalanche, Fantom, Cronos, ETC, opBNB, CELO, KAVA, Tron, Polkadot'};
  if(/^[0-9a-fA-F]{64}$/.test(h))
    return{label:'64-char hex (no 0x prefix)',chains:'Bitcoin, Litecoin, Dogecoin, BCH, BSV, BCD, Monero, Nano, Cardano, XRP, Stellar, NEAR, TON'};
  if(h.startsWith('o')&&h.length>=50&&h.length<=54&&/^[1-9A-HJ-NP-Za-km-z]+$/.test(h))
    return{label:'Tezos operation hash (Base58)',chains:'Tezos'};
  if(h.length>=43&&h.length<=90&&/^[1-9A-HJ-NP-Za-km-z]+$/.test(h))
    return{label:'Base58 format',chains:'Solana, NEAR, Tezos'};
  return null;
}

/* ════════════════════════════════════════════
   RENDER HELPERS
════════════════════════════════════════════ */
function renderChainGrid(){
  return`<div class="chain-grid">${CHAINS.map(c=>{
    const s=statuses[c.id]??'idle', cfg=STATUS_CFG[s], found=s==='found';
    return`<div class="chain-card${found?' found':''}">
      <div class="chain-badge" style="background:${hexCol(c.color,.1)};border:1.5px solid ${c.color};color:${c.color}">
        ${c.symbol.length>4?c.symbol.slice(0,4):c.symbol}
      </div>
      <div style="min-width:0">
        <div class="chain-name">${c.name}</div>
        <div class="chain-status ${cfg.cls}">
          <i class="ti ${cfg.icon}${s==='searching'?' spin':''}"></i> ${cfg.label}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTimestamp(bt){
  if(!bt) return`<div class="ts-banner">
    <i class="ti ti-clock"></i>
    <div>
      <div class="ts-banner-label">Transaction time</div>
      <div class="ts-banner-value" style="color:var(--text3);font-style:italic;font-size:12px">Timestamp not available for this chain</div>
    </div>
  </div>`;
  return`<div class="ts-banner">
    <i class="ti ti-clock"></i>
    <div>
      <div class="ts-banner-label">Transaction time &nbsp;·&nbsp; Panama (UTC−5)</div>
      <div class="ts-banner-value">${escHtml(bt.time)} &nbsp;<span style="font-weight:400;color:var(--text2)">${escHtml(bt.date)}</span></div>
    </div>
  </div>`;
}

function renderTokenTransfers(transfers){
  if(!transfers?.length)return'';
  return`<div class="token-section">
    <div class="token-section-title"><i class="ti ti-coin"></i> Token transfer${transfers.length>1?'s':''} (${transfers.length})</div>
    ${transfers.map(t=>`<div class="token-row">
      <div style="flex:1;min-width:0">
        <div class="token-left">
          <div class="token-icon">${escHtml((t.symbol||'?').slice(0,5))}</div>
          <div>
            <div class="token-symbol">${escHtml(t.symbol)}</div>
            ${t.contractAddr?`<div class="token-contract">${truncAddr(t.contractAddr,8,6)}</div>`:''}
          </div>
        </div>
        ${(t.from||t.to)?`<div class="token-addrs" style="margin-top:8px">
          ${t.from&&t.from!=='?'?`<div class="token-addr-row"><span class="token-addr-tag">From</span><span class="token-addr-val">${escHtml(t.from)}</span></div>`:''}
          ${t.to  &&t.to  !=='?'?`<div class="token-addr-row"><span class="token-addr-tag">To</span><span class="token-addr-val">${escHtml(t.to)}</span></div>`:''}
        </div>`:''}
      </div>
      <div class="token-amount-col">
        <div class="token-amount">${escHtml(String(t.amount))}</div>
        <div class="token-amount-label">${escHtml(t.symbol)}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderResultCards(){
  const found=CHAINS.filter(c=>statuses[c.id]==='found');
  if(!found.length)return'';
  return`<div class="results-label">
    <i class="ti ti-circle-check"></i>
    Match${found.length>1?'es':''} found on ${found.map(c=>c.name).join(' · ')}
  </div>
  ${found.map(c=>{
    const r=results[c.id]; if(!r)return'';
    const tokenTransfers=r.tokenTransfers??[];
    const hasTokens=tokenTransfers.length>0;
    const nativeIsMoot=hasTokens&&(r.nativeValue?.startsWith('0 ')||r.nativeValue==='0');
    const mainFields=Object.entries(r).filter(([k])=>!HIDE_FIELDS.has(k)&&!MONO_FIELDS.has(k)&&k!=='nativeValue');
    const allFields=r.nativeValue?[['nativeValue',r.nativeValue],...mainFields]:mainFields;
    const addrFields=Object.entries(r).filter(([k])=>MONO_FIELDS.has(k));
    const isPrivacy=String(r.nativeValue||'').includes('Hidden');
    return`<div class="result-card">
      <div class="result-header">
        <div class="result-chain-info">
          <div class="result-badge" style="background:${hexCol(c.color,.12)};border:2px solid ${c.color};color:${c.color}">
            ${c.symbol.length>4?c.symbol.slice(0,4):c.symbol}
          </div>
          <div>
            <div class="result-chain-name">${c.name}</div>
            <div class="result-chain-status ${r.confirmed?'ok':'pending'}">
              <i class="ti ${r.confirmed?'ti-circle-check':'ti-clock'}"></i>
              ${r.confirmed?'Confirmed':'Pending / Unconfirmed'}
            </div>
          </div>
        </div>
        ${r.explorerUrl?`<a class="explorer-link" href="${escHtml(r.explorerUrl)}" target="_blank" rel="noopener">
          Explorer <i class="ti ti-external-link"></i>
        </a>`:''}
      </div>

      ${renderTimestamp(r.blockTime)}

      ${renderTokenTransfers(tokenTransfers)}

      <div class="fields-grid" style="${hasTokens?'margin-top:14px':''}">
        ${allFields.map(([k,v])=>`<div>
          <div class="field-label">${FIELD_LABELS[k]??k}</div>
          <div class="field-value${k==='nativeValue'&&nativeIsMoot?' muted':k==='nativeValue'&&isPrivacy?' privacy':''}">${escHtml(String(v))}</div>
        </div>`).join('')}
      </div>

      ${addrFields.length?`<div class="addresses-section">
        <hr class="divider"/>
        <div class="field-label" style="margin-bottom:8px">Addresses</div>
        ${addrFields.map(([k,v])=>`<div class="address-row">
          <span class="address-tag">${FIELD_LABELS[k]??k}</span>
          <span class="address-val">${escHtml(String(v))}</span>
        </div>`).join('')}
      </div>`:''}
    </div>`;
  }).join('')}`;
}

function renderEmpty(){
  const allDone=Object.values(statuses).every(s=>s!=='searching');
  const anyFound=Object.values(statuses).some(s=>s==='found');
  if(!allDone||anyFound)return'';
  return`<div class="empty-state">
    <i class="ti ti-search-off"></i>
    <h3>No match found</h3>
    <p>This hash was not found on any of the ${CHAINS.length} supported chains.</p>
    <small>Some APIs may have been temporarily unavailable — try again if you expected a result.</small>
  </div>`;
}

function renderWelcome(){
  return`<div class="welcome">
    <i class="ti ti-topology-star-ring-3" style="color:var(--text3)"></i>
    <p>Paste a transaction hash above to identify the chain, view the Panama-time timestamp, and detect token transfers across ${CHAINS.length} blockchains.</p>
  </div>
  <div class="chain-strip">
    ${CHAINS.map(c=>`<span class="chain-pill" style="border-color:${hexCol(c.color,.35)};color:${c.color}">${c.name}</span>`).join('')}
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!Object.keys(statuses).length){app.innerHTML=renderWelcome();return;}
  app.innerHTML=renderChainGrid()+renderResultCards()+renderEmpty();
}

/* ════════════════════════════════════════════
   EVENT WIRING
════════════════════════════════════════════ */
const hashInput=document.getElementById('hashInput');
const searchBtn=document.getElementById('searchBtn');
const hintBox=document.getElementById('hintBox');
const hintText=document.getElementById('hintText');

hashInput.addEventListener('input',()=>{
  const h=hashInput.value.trim();
  searchBtn.disabled=!h||searching;
  const hint=h?hashHint(h):null;
  if(hint){
    hintText.innerHTML=`<strong>${escHtml(hint.label)}</strong> — likely: ${escHtml(hint.chains)}`;
    hintBox.style.display='flex';
  }else{hintBox.style.display='none';}
});

hashInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchBtn.click();});

searchBtn.addEventListener('click',async()=>{
  const hash=hashInput.value.trim();
  if(!hash||searching)return;
  searching=true; searchBtn.disabled=true;
  searchBtn.innerHTML=`<i class="ti ti-loader-2 spin"></i> <span>Searching…</span>`;
  statuses={}; results={};
  CHAINS.forEach(c=>{statuses[c.id]='searching';});
  render();

  const update=(id,status,result)=>{
    statuses[id]=status;
    if(result)results[id]=result;
    render();
  };

  await Promise.allSettled(CHAINS.map(async chain=>{
    try{
      const r=await searchChain(chain,hash);
      update(chain.id,r?'found':'not_found',r);
    }catch{update(chain.id,'error');}
  }));

  searching=false; searchBtn.disabled=false;
  searchBtn.innerHTML=`<i class="ti ti-search"></i> <span>Search</span>`;
  render();
});

render();
</script>
