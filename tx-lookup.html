<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transaction &amp; Address Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --text:#e8eaf0; --text2:#8b8fa8; --text3:#565970;
    --accent:#4f8ef7; --success:#34c77b; --warning:#f5a623; --danger:#f05353;
    --token:#a78bfa; --ts:#38bdf8; --addr:#fb923c;
    --success-bg:rgba(52,199,123,0.10); --token-bg:rgba(167,139,250,0.08);
    --token-border:rgba(167,139,250,0.25); --ts-bg:rgba(56,189,248,0.07);
    --addr-bg:rgba(251,146,60,0.07); --addr-border:rgba(251,146,60,0.22);
    --radius:10px; --radius-lg:14px;
    --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
  .page { max-width:900px; margin:0 auto; }

  .header { display:flex; align-items:center; gap:14px; margin-bottom:2rem; }
  .header-icon { width:46px; height:46px; border-radius:12px; background:linear-gradient(135deg,#1c2340,#2a3060); border:1px solid rgba(79,142,247,0.3); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--accent); flex-shrink:0; }
  .header h1 { font-size:20px; font-weight:600; }
  .header p  { font-size:13px; color:var(--text2); margin-top:2px; line-height:1.5; }

  .search-row { display:flex; gap:10px; margin-bottom:10px; }
  .search-input { flex:1; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius); padding:0 14px; height:46px; font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color .15s; }
  .search-input::placeholder { color:var(--text3); }
  .search-input:focus { border-color:var(--accent); }
  .search-btn { height:46px; padding:0 22px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity .15s,transform .1s; display:flex; align-items:center; gap:6px; }
  .search-btn:hover:not(:disabled) { opacity:.88; }
  .search-btn:active:not(:disabled) { transform:scale(.97); }
  .search-btn:disabled { opacity:.45; cursor:not-allowed; }

  .hint { display:flex; align-items:flex-start; gap:8px; border-radius:8px; padding:8px 12px; font-size:12px; color:var(--text2); margin-bottom:1.25rem; line-height:1.5; border:1px solid; }
  .hint.tx-hint    { background:rgba(79,142,247,.08);  border-color:rgba(79,142,247,.2);  }
  .hint.addr-hint  { background:var(--addr-bg);        border-color:var(--addr-border);   }
  .hint i { margin-top:1px; flex-shrink:0; }
  .hint.tx-hint i  { color:var(--accent); }
  .hint.addr-hint i { color:var(--addr); }
  .hint strong { color:var(--text); font-weight:500; }

  /* mode tabs */
  .mode-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; border-radius:20px; margin-bottom:12px; }
  .mode-badge.tx-mode   { background:rgba(79,142,247,.12); color:var(--accent); border:1px solid rgba(79,142,247,.25); }
  .mode-badge.addr-mode { background:var(--addr-bg); color:var(--addr); border:1px solid var(--addr-border); }

  .chain-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:6px; margin-bottom:1.5rem; }
  .chain-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; display:flex; align-items:center; gap:8px; }
  .chain-card.found    { background:var(--success-bg);   border-color:rgba(52,199,123,.35); }
  .chain-card.inactive { opacity:.45; }
  .chain-badge { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; letter-spacing:-.03em; }
  .chain-name   { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chain-status { font-size:10px; display:flex; align-items:center; gap:3px; margin-top:1px; }
  .chain-status.idle      { color:var(--text3); }
  .chain-status.searching { color:var(--warning); }
  .chain-status.found     { color:var(--success); }
  .chain-status.not_found { color:var(--text3); }
  .chain-status.error     { color:var(--warning); }

  .results-label { font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text2); display:flex; align-items:center; gap:6px; margin-bottom:10px; }
  .results-label i { color:var(--success); }

  .result-card { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:1.1rem 1.25rem; margin-bottom:10px; }
  .result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .result-chain-info { display:flex; align-items:center; gap:11px; }
  .result-badge { width:42px; height:42px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
  .result-chain-name   { font-size:15px; font-weight:600; }
  .result-chain-sub    { font-size:12px; color:var(--text3); font-family:var(--mono); margin-top:2px; word-break:break-all; }
  .result-chain-status { font-size:12px; display:flex; align-items:center; gap:4px; margin-top:2px; }
  .result-chain-status.ok      { color:var(--success); }
  .result-chain-status.pending { color:var(--warning); }
  .explorer-link { font-size:12px; color:var(--accent); text-decoration:none; display:flex; align-items:center; gap:4px; opacity:.85; transition:opacity .15s; flex-shrink:0; }
  .explorer-link:hover { opacity:1; }

  .divider { border:none; border-top:1px solid var(--border); margin:12px 0; }

  /* timestamp banner */
  .ts-banner { display:flex; align-items:center; gap:10px; background:var(--ts-bg); border:1px solid rgba(56,189,248,.18); border-radius:8px; padding:9px 13px; margin-bottom:12px; }
  .ts-banner i { color:var(--ts); font-size:15px; flex-shrink:0; }
  .ts-banner-label { font-size:11px; color:var(--text3); }
  .ts-banner-value { font-size:13px; font-weight:600; color:var(--ts); font-family:var(--mono); }

  /* address balance banner */
  .addr-banner { display:flex; align-items:center; gap:10px; background:var(--addr-bg); border:1px solid var(--addr-border); border-radius:8px; padding:9px 13px; margin-bottom:12px; }
  .addr-banner i { color:var(--addr); font-size:18px; flex-shrink:0; }
  .addr-banner-label { font-size:11px; color:var(--text3); }
  .addr-banner-value { font-size:18px; font-weight:600; color:var(--text); }

  .fields-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:12px 20px; }
  .field-label { font-size:11px; color:var(--text3); margin-bottom:3px; }
  .field-value { font-size:13px; font-weight:500; color:var(--text); line-height:1.4; word-break:break-all; }
  .field-value.muted   { color:var(--text3); font-weight:400; }
  .field-value.privacy { color:var(--warning); font-weight:400; font-style:italic; font-size:12px; }

  .addresses-section { margin-top:2px; }
  .address-row { display:flex; gap:8px; margin-bottom:5px; flex-wrap:wrap; align-items:baseline; }
  .address-tag { font-size:11px; color:var(--text3); flex-shrink:0; min-width:22px; }
  .address-val { font-size:12px; font-family:var(--mono); color:var(--text2); word-break:break-all; }

  .token-section { margin-top:14px; }
  .token-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--token); display:flex; align-items:center; gap:5px; margin-bottom:8px; }
  .token-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; background:var(--token-bg); border:1px solid var(--token-border); border-radius:8px; padding:10px 12px; margin-bottom:6px; }
  .token-row:last-child { margin-bottom:0; }
  .token-left { display:flex; align-items:center; gap:10px; min-width:0; }
  .token-icon { width:30px; height:30px; border-radius:50%; background:rgba(167,139,250,.15); border:1.5px solid var(--token-border); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--token); flex-shrink:0; }
  .token-symbol { font-size:14px; font-weight:600; }
  .token-contract { font-size:11px; font-family:var(--mono); color:var(--text3); margin-top:1px; }
  .token-amount-col { text-align:right; flex-shrink:0; }
  .token-amount { font-size:15px; font-weight:600; font-family:var(--mono); }
  .token-amount-label { font-size:11px; color:var(--text3); margin-top:2px; }
  .token-addrs { margin-top:8px; padding-top:8px; border-top:1px solid var(--token-border); }
  .token-addr-row { display:flex; gap:6px; align-items:baseline; flex-wrap:wrap; margin-bottom:3px; }
  .token-addr-tag { font-size:10px; color:var(--text3); min-width:22px; flex-shrink:0; }
  .token-addr-val { font-size:11px; font-family:var(--mono); color:var(--text2); word-break:break-all; }

  .empty-state { text-align:center; padding:3rem 1rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); }
  .empty-state i { font-size:42px; color:var(--text3); display:block; margin-bottom:12px; }
  .empty-state h3 { font-size:15px; font-weight:500; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:var(--text2); line-height:1.6; }
  .empty-state small { font-size:12px; color:var(--text3); display:block; margin-top:6px; }
  .welcome { text-align:center; padding:3rem 1rem 2rem; color:var(--text3); }
  .welcome i { font-size:48px; display:block; margin-bottom:12px; }
  .welcome p { font-size:13px; line-height:1.7; max-width:480px; margin:0 auto; }
  .chain-strip { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1.5rem; padding:12px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
  .chain-pill { font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; border:1px solid var(--border2); color:var(--text2); background:var(--bg3); }

  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .spin { display:inline-block; animation:spin .9s linear infinite; }

  /* copy button */
  .copy-btn { background:none; border:none; cursor:pointer; padding:1px 3px; color:var(--text3); border-radius:4px; transition:color .15s,transform .1s; display:inline-flex; align-items:center; flex-shrink:0; line-height:1; }
  .copy-btn:hover { color:var(--text2); }
  .copy-btn:active { transform:scale(.85); }
  .copy-btn i { font-size:11px; }

  /* history */
  .history-section { margin-top:1.75rem; }
  .history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .history-header-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); display:flex; align-items:center; gap:5px; }
  .history-clear { background:none; border:none; cursor:pointer; font-size:11px; color:var(--text3); font-family:var(--sans); padding:2px 6px; border-radius:4px; transition:color .15s; }
  .history-clear:hover { color:var(--danger); }
  .history-item { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:border-color .15s,background .15s; margin-bottom:5px; }
  .history-item:hover { border-color:var(--border2); background:var(--bg3); }
  .history-item:last-child { margin-bottom:0; }
  .history-icon { color:var(--text3); flex-shrink:0; font-size:13px; }
  .history-input { font-family:var(--mono); font-size:12px; color:var(--text2); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .history-time { font-size:11px; color:var(--text3); flex-shrink:0; white-space:nowrap; }
  .history-chains { display:flex; align-items:center; gap:4px; flex-shrink:0; }
  .history-item.no-match .history-input { color:var(--text3); }
  .share-btn { background:none; border:1px solid var(--border2); cursor:pointer; color:var(--text3); font-size:11px; font-family:var(--sans); padding:0 10px; height:46px; border-radius:var(--radius); display:flex; align-items:center; gap:5px; transition:color .15s,border-color .15s; flex-shrink:0; }
  .share-btn:hover { color:var(--accent); border-color:var(--accent); }
  .share-btn.copied { color:var(--success); border-color:var(--success); }

  /* ── Navigation tabs ── */
  .nav-tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:3px;margin-bottom:1.25rem;}
  .nav-tab{flex:1;padding:7px 16px;border:none;background:none;cursor:pointer;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text3);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .nav-tab.active{background:var(--bg3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .nav-tab:hover:not(.active){color:var(--text2);}
  /* ── Gas Tracker ── */
  .gas-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
  .gas-refresh-btn{background:none;border:1px solid var(--border2);border-radius:8px;cursor:pointer;color:var(--text3);font-size:12px;padding:5px 12px;font-family:var(--sans);transition:color .15s,border-color .15s;display:flex;align-items:center;gap:5px;}
  .gas-refresh-btn:hover{color:var(--accent);border-color:var(--accent);}
  .gas-refresh-btn.spinning i{animation:spin .9s linear infinite;}
  .gas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .gas-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:14px 16px;}
  .gas-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .gas-badge-sm{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;}
  .gas-chain-nm{font-size:14px;font-weight:600;}
  .gas-base-fee{font-size:11px;color:var(--text3);margin-top:1px;}
  .gas-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
  .gas-tier{text-align:center;padding:8px 4px;border-radius:8px;background:var(--bg3);}
  .gas-tier-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:2px;margin-bottom:5px;}
  .gas-tier-gwei{font-size:17px;font-weight:700;font-family:var(--mono);line-height:1;}
  .gas-tier-usd{font-size:11px;color:var(--text2);margin-top:4px;}
  .gas-note{text-align:center;font-size:10px;color:var(--text3);margin-top:7px;}
  /* watch banner */
  .watch-banner{display:flex;align-items:center;gap:10px;background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:9px 14px;margin-bottom:12px;}
  .watch-banner.active{background:rgba(245,166,35,.07);border-color:rgba(245,166,35,.25);}
  .watch-btn{background:none;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-family:var(--sans);font-size:11px;padding:3px 10px;color:var(--text2);transition:color .15s,border-color .15s;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
  .watch-btn:hover{color:var(--accent);border-color:var(--accent);}
  .watch-btn.stop:hover{color:var(--danger);border-color:var(--danger);}
  /* ── Price panel ── */
  .price-controls{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .price-mode-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:6px;background:none;cursor:pointer;font-family:var(--sans);font-size:12px;color:var(--text3);transition:all .15s;display:flex;align-items:center;gap:5px;}
  .price-mode-btn.active{background:var(--bg3);color:var(--text);border-color:var(--accent);}
  .price-mode-btn:hover:not(.active){color:var(--text2);}
  .price-date-input{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;color:var(--text);font-family:var(--sans);font-size:12px;color-scheme:dark;cursor:pointer;}
  .price-table{width:100%;border-collapse:collapse;}
  .price-table th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:8px 14px;text-align:left;border-bottom:1px solid var(--border);}
  .price-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
  .price-table tbody tr:last-child td{border-bottom:none;}
  .price-table tbody tr:hover td{background:rgba(255,255,255,.02);}
  .price-symbol{font-weight:700;font-family:var(--mono);color:var(--text);width:64px;}
  .price-name{color:var(--text2);font-size:12px;}
  .price-value{font-weight:600;font-family:var(--mono);text-align:right;}
  .price-change{text-align:right;font-size:11px;font-family:var(--mono);width:80px;}
  .price-up{color:var(--success);}
  .price-down{color:var(--danger);}

  @media(max-width:600px) {
    .header h1 { font-size:17px; }
    .chain-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); }
    .search-btn span { display:none; }
    .token-row,.ts-banner { flex-wrap:wrap; }
    .token-amount-col { text-align:left; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-icon"><i class="ti ti-topology-ring-3"></i></div>
    <div>
      <h1>Transaction &amp; Address Lookup</h1>
      <p>Paste a transaction hash <em>or</em> a wallet address — 64 chains, automatic detection.</p>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tabLookup" onclick="switchTab('lookup')"><i class="ti ti-topology-ring-3"></i> Lookup</button>
    <button class="nav-tab" id="tabGas" onclick="switchTab('gas')"><i class="ti ti-gas-station"></i> Gas Tracker</button>
    <button class="nav-tab" id="tabPrices" onclick="switchTab('prices')"><i class="ti ti-currency-dollar"></i> Prices</button>
  </div>
  <div class="search-row" id="searchRow">
    <input class="search-input" id="hashInput" type="text"
      placeholder="Paste a tx hash or wallet address…"
      autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="search-btn" id="searchBtn" disabled>
      <i class="ti ti-search"></i><span>Search</span>
    </button>
    <button class="share-btn" id="shareBtn" title="Copy shareable link" style="display:none">
      <i class="ti ti-link"></i><span>Share</span>
    </button>
  </div>
  <div class="hint" id="hintBox" style="display:none">
    <i id="hintIcon"></i><span id="hintText"></span>
  </div>
  <div id="app"></div>
</div>
<script>
/* ══════════════════════════════════════════════
   CHAIN DEFINITIONS
══════════════════════════════════════════════ */
const CHAINS=[
  {id:"bitcoin",  name:"Bitcoin",        symbol:"BTC",  color:"#F7931A",type:"bitcoin",
    addrExplorer:"https://blockstream.info/address/"},
  {id:"litecoin", name:"Litecoin",       symbol:"LTC",  color:"#345D9D",type:"blockcypher",coin:"ltc",
    explorerBase:"https://live.blockcypher.com/ltc/tx/",addrExplorer:"https://live.blockcypher.com/ltc/address/"},
  {id:"dogecoin", name:"Dogecoin",       symbol:"DOGE", color:"#C2A633",type:"blockcypher",coin:"doge",
    explorerBase:"https://live.blockcypher.com/doge/tx/",addrExplorer:"https://live.blockcypher.com/doge/address/"},
  {id:"bch",      name:"Bitcoin Cash",   symbol:"BCH",  color:"#8DC351",type:"blockcypher",coin:"bch",
    explorerBase:"https://live.blockcypher.com/bch/tx/",addrExplorer:"https://live.blockcypher.com/bch/address/"},
  {id:"bsv",      name:"Bitcoin SV",     symbol:"BSV",  color:"#EAB300",type:"bsv",
    addrExplorer:"https://whatsonchain.com/address/"},
  {id:"bcd",      name:"Bitcoin Diamond",symbol:"BCD",  color:"#1A73E8",type:"bcd",
    addrExplorer:"https://blockchair.com/bitcoin-diamond/address/"},
  {id:"xrp",      name:"Ripple (XRP)",  symbol:"XRP",  color:"#00AAE4",type:"xrp",
    addrExplorer:"https://livenet.xrpl.org/accounts/"},
  {id:"cardano",  name:"Cardano",        symbol:"ADA",  color:"#0033AD",type:"cardano",
    addrExplorer:"https://cardanoscan.io/address/"},

/* ── Session history (localStorage, capped at 20) ── */
const HISTORY_KEY='txlookup_history';
const HISTORY_MAX=20;

function loadHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch{return[];}
}
function saveHistory(entry){
  try{
    let h=loadHistory().filter(e=>e.input!==entry.input); // deduplicate
    h.unshift(entry);
    localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,HISTORY_MAX)));
  }catch{}
}
function clearHistory(){try{localStorage.removeItem(HISTORY_KEY);}catch{}render();}
function rerunSearch(raw){
  hashInput.value=raw;
  hashInput.dispatchEvent(new Event('input'));
  searchBtn.click();
}

function abortIn(ms){const c=new AbortController();setTimeout(()=>c.abort(),ms);return c.signal;}
function hexCol(c,a){return c+Math.round(a*255).toString(16).padStart(2,'0');}
function truncAddr(a,f=10,b=8){if(!a||a.length<=f+b+3)return a;return`${a.slice(0,f)}…${a.slice(-b)}`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const PANAMA_DT=new Intl.DateTimeFormat('en-US',{timeZone:'America/Panama',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
const PANAMA_D =new Intl.DateTimeFormat('en-US',{timeZone:'America/Panama',weekday:'short',year:'numeric',month:'short',day:'numeric'});
const PANAMA_T =new Intl.DateTimeFormat('en-US',{timeZone:'America/Panama',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
function toPanama(secs){
  if(!secs)return null;
  try{const d=new Date(Number(secs)*1000);if(isNaN(d))return null;
    return{date:PANAMA_D.format(d),time:PANAMA_T.format(d),full:PANAMA_DT.format(d),secs:Number(secs)};}
  catch{return null;}
}
function isoToSecs(s){if(!s)return null;const ms=Date.parse(s);return isNaN(ms)?null:ms/1000;}

/* ── Relative time ── */
function relativeTime(secs){
  if(!secs)return null;
  const diff=Math.floor(Date.now()/1000)-secs;
  if(diff<0)return'just now';
  if(diff<60)return`${diff}s ago`;
  if(diff<3600)return`${Math.floor(diff/60)}m ago`;
  if(diff<86400)return`${Math.floor(diff/3600)}h ago`;
  if(diff<86400*30)return`${Math.floor(diff/86400)}d ago`;
  if(diff<86400*365)return`${Math.floor(diff/(86400*30))}mo ago`;
  return`${Math.floor(diff/(86400*365))}y ago`;
}

/* ── USD value at tx time (CoinGecko historical price) ── */
function formatUSD(n){
  if(n>=1e6) return`$${(n/1e6).toFixed(2)}M`;
  if(n>=1000)return`$${n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  if(n>=0.01)return`$${n.toFixed(2)}`;
  return`$${n.toFixed(6)}`;
}

async function fetchHistoricalUSD(symbol,secs){
  const id=COINGECKO_IDS[symbol];
  if(!id||!secs)return null;
  const d=new Date(Number(secs)*1000);
  const cacheKey=`${id}_${d.getUTCFullYear()}_${d.getUTCMonth()}_${d.getUTCDate()}`;
  if(priceCache[cacheKey]!==undefined)return priceCache[cacheKey];
  try{
    const dd=String(d.getUTCDate()).padStart(2,'0');
    const mm=String(d.getUTCMonth()+1).padStart(2,'0');
    const yyyy=d.getUTCFullYear();
    const r=await fetch(
      `https://api.coingecko.com/api/v3/coins/${id}/history?date=${dd}-${mm}-${yyyy}&localization=false`,
      {signal:abortIn(10000)}
    );
    if(!r.ok){priceCache[cacheKey]=null;return null;}
    const data=await r.json();
    const price=data.market_data?.current_price?.usd??null;
    priceCache[cacheKey]=price;
    return price;
  }catch{priceCache[cacheKey]=null;return null;}
}

async function fetchAndApplyUSD(chainId,result){
  if(!result.blockTime?.secs||!result.nativeValue)return;
  const parts=String(result.nativeValue).split(' ');
  if(parts.length<2)return;
  const amount=parseFloat(parts[0]);
  const symbol=parts[1];
  if(isNaN(amount)||amount===0||result.nativeValue.includes('🔒')||result.nativeValue.includes('See'))return;
  const price=await fetchHistoricalUSD(symbol,result.blockTime.secs);
  if(price!==null&&results[chainId]){
    results[chainId]._usd=formatUSD(amount*price);
    render();
  }
}

async function fetchAndApplyTokenTransferUSD(chainId,result){
  if(!result.tokenTransfers?.length||!result.blockTime?.secs)return;
  let changed=false;
  for(let i=0;i<result.tokenTransfers.length;i++){
    const t=result.tokenTransfers[i];
    if(t._usd!==undefined)continue;
    if(results[chainId]?.tokenTransfers?.[i])results[chainId].tokenTransfers[i]._usd=null;
    const price=await fetchHistoricalUSD(t.symbol,result.blockTime.secs);
    if(price!==null&&results[chainId]?.tokenTransfers?.[i]){
      const amt=parseFloat(String(t.amount).replace(/,/g,''));
      if(!isNaN(amt)&&amt>0){
        results[chainId].tokenTransfers[i]._usd=formatUSD(amt*price);changed=true;
      }
    }
  }
  if(changed)render();
}

/* ── Domain name resolution ── */
async function resolveENS(name){
  try{
    const r=await fetch(`https://api.ensideas.com/ens/resolve/${encodeURIComponent(name)}`,{signal:abortIn(9000)});
    if(!r.ok)return null;
    const d=await r.json();
    return d.address??null;
  }catch{return null;}
}
async function resolveUD(domain){
  try{
    const r=await fetch(`https://api.ud.me/resolve/${encodeURIComponent(domain)}`,{signal:abortIn(9000)});
    if(!r.ok)return null;
    const d=await r.json();
    return d.records?.['crypto.ETH.address']??d.meta?.owner??null;
  }catch{return null;}
}

/* ── Copy to clipboard ── */
async function copyText(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    const i=btn.querySelector('i');
    const orig=i.className; i.className='ti ti-check'; btn.style.color='var(--success)';
    setTimeout(()=>{i.className=orig;btn.style.color='';},1500);
  }catch{}
}
function copyBtn(text){
  const safe=String(text).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return`<button class="copy-btn" onclick="copyText('${safe}',this)" title="Copy to clipboard"><i class="ti ti-copy"></i></button>`;
}

/* ── On-demand label fetching ──────────────────────────
   Sources tried in order:
   1. ENS reverse record  (free, no key)
   2. Etherscan-family contract source name
      (free API key in CFG.ETHERSCAN_KEY unlocks this;
       get one free at etherscan.io/register)
   3. Blockscout public tags (for supported chains)
   4. OFAC sanctions check via ofac.dev (free)
   Note: Etherscan name tags on EOA wallets need their
   Pro API. Unknown EOAs only show if in KNOWN_LABELS.
────────────────────────────────────────────────────── */
async function applyOnDemandLabel(addr,chainId){
  if(!addr||addr==='N/A'||addr==='Contract creation'||addr==='(unknown)')return;
  const lower=String(addr).toLowerCase();

  // OFAC check — run in parallel regardless of other label state
  if(lower.startsWith('0x')&&lower.length===42&&!ofacFlags.has(lower)){
    (async()=>{
      try{
        const r=await fetch('https://api.ofac.dev/v1/screen',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({address:addr}),signal:abortIn(8000),
        });
        if(r.ok){const d=await r.json();if(d.hit===true){ofacFlags.add(lower);render();}}
      }catch{}
    })();
  }

  if(getLabel(addr)||onDemandLabels[lower]===null)return;
  onDemandLabels[lower]=null; // mark attempted

  // 1. ENS reverse (free)
  if(lower.startsWith('0x')&&lower.length===42){
    try{
      const r=await fetch(`https://api.ensideas.com/ens/reverse/${addr}`,{signal:abortIn(5000)});
      if(r.ok){const d=await r.json();if(d.name){onDemandLabels[lower]={label:d.name,type:'protocol'};render();return;}}
    }catch{}
  }

  // 2. Etherscan-family contract name
  const apiBase=EXPLORER_APIS[chainId];
  if(apiBase){
    try{
      const key=CFG.ETHERSCAN_KEY?`&apikey=${CFG.ETHERSCAN_KEY}`:'';
      const r=await fetch(`${apiBase}?module=contract&action=getsourcecode&address=${addr}${key}`,{signal:abortIn(8000)});
      if(r.ok){
        const d=await r.json();
        if(d.status==='1'){
          const name=d.result?.[0]?.ContractName;
          if(name&&name.length>0&&name!=='N/A'){onDemandLabels[lower]={label:name,type:'protocol'};render();return;}
        }
      }
    }catch{}
  }

  // 3. Blockscout public tags
  const bsBase=BLOCKSCOUT_APIS[chainId];
  if(bsBase){
    try{
      const r=await fetch(`${bsBase}/api/v2/addresses/${addr}`,{signal:abortIn(7000)});
      if(r.ok){
        const d=await r.json();
        const tag=d.name_tag??d.public_tags?.[0]?.label??d.private_tags?.[0]?.label;
        if(tag&&tag.length>0){onDemandLabels[lower]={label:tag,type:'protocol'};render();return;}
      }
    }catch{}
  }
}

/* ── Token balance fetching (ERC-20 balanceOf via RPC) ── */
async function fetchAndApplyTokenBalances(chainId,address,rpc){
  const tokens=TOKEN_WATCHLIST[chainId];
  if(!tokens?.length||!rpc)return;
  const data='0x70a08231'+address.slice(2).padStart(64,'0'); // balanceOf(address)
  const balances=await Promise.allSettled(tokens.map(async t=>{
    try{
      const r=await fetch(rpc,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:t.a,data},'latest']}),
        signal:abortIn(5000)});
      const d=await r.json();
      const raw=d.result;
      if(!raw||raw==='0x')return null;
      if(BigInt(raw)===0n)return null;
      return{symbol:t.s,amount:formatTokenAmt(raw,t.d)};
    }catch{return null;}
  }));
  const nonZero=balances.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
  if(nonZero.length&&results[chainId]){
    results[chainId]._tokenBalances=nonZero;
    render();
  }
}
function decodeABIString(hex){
  if(!hex||hex==='0x'||hex.length<4)return null;
  const d=hex.startsWith('0x')?hex.slice(2):hex;
  try{const off=parseInt(d.slice(0,64),16);
    if(off<d.length/2){const lp=off*2,len=parseInt(d.slice(lp,lp+64),16);
      if(len>0&&len<200){const b=new Uint8Array(d.slice(lp+64,lp+64+len*2).match(/.{2}/g).map(x=>parseInt(x,16)));
        const s=new TextDecoder().decode(b);if(/^[\x20-\x7E]+$/.test(s))return s.trim();}}}
  catch{}
  try{const b=new Uint8Array(d.match(/.{2}/g).slice(0,32).map(x=>parseInt(x,16))).filter(x=>x!==0);
    const s=new TextDecoder().decode(b);if(s.length>0&&/^[\x20-\x7E]+$/.test(s))return s.trim();}
  catch{}
  return null;
}
function formatTokenAmt(hex,dec){
  try{if(!hex||hex==='0x')return'0';
    const r=BigInt(hex),D=BigInt(dec),v=10n**D,w=r/v,f=r%v;
    if(f===0n)return w.toLocaleString();
    return`${w.toLocaleString()}.${f.toString().padStart(dec,'0').slice(0,8).replace(/0+$/,'')}`;
  }catch{return'?';}}

/* ══════════════════════════════════════════════
   INPUT TYPE DETECTION
══════════════════════════════════════════════ */
function detectInput(raw){
  const h=raw.trim();
  if(!h)return null;

  /* ── Domain names (resolve first, then look up as address) ── */
  if(/^[a-z0-9-]+\.eth$/i.test(h))
    return{mode:'address',addrType:'ens',icon:'ti-world',
      hint:'<strong>ENS domain</strong> — will resolve to address then search all EVM chains'};
  if(/^[a-z0-9-]+\.(crypto|wallet|bitcoin|x|nft|dao|blockchain|888|zil|klever|hi|kresus|polygon|anime|manga|binanceus)$/i.test(h))
    return{mode:'address',addrType:'ud',icon:'ti-world',
      hint:'<strong>Unstoppable Domain</strong> — will resolve to address then search all EVM chains'};

  /* ── Addresses (most specific patterns first) ── */
  // Flow: 0x + exactly 16 hex chars (must check BEFORE EVM 0x+40hex)
  if(/^0x[0-9a-fA-F]{16}$/.test(h))
    return{mode:'address',addrType:'flow',icon:'ti-wallet',hint:'<strong>Flow address</strong>'};
  // Hedera: shard.realm.account  e.g. 0.0.12345
  if(/^\d+\.\d+\.\d+$/.test(h)&&h.split('.').length===3)
    return{mode:'address',addrType:'hedera',icon:'ti-wallet',hint:'<strong>Hedera account ID</strong>'};
  // MultiversX: erd1 + 58 bech32 chars
  if(/^erd1[a-z0-9]{58}$/.test(h))
    return{mode:'address',addrType:'multiversx',icon:'ti-wallet',hint:'<strong>MultiversX address</strong>'};
  // Algorand: 58-char uppercase base32
  if(/^[A-Z2-7]{58}$/.test(h))
    return{mode:'address',addrType:'algorand',icon:'ti-wallet',hint:'<strong>Algorand address</strong>'};
  // Kaspa: kaspa: prefix
  if(/^kaspa:[a-z0-9]{61,65}$/.test(h))
    return{mode:'address',addrType:'kaspa',icon:'ti-wallet',hint:'<strong>Kaspa address</strong>'};
  // Cosmos SDK chains (bech32, chain-specific prefixes)
  if(/^cosmos1[a-z0-9]{38}$/.test(h))
    return{mode:'address',addrType:'cosmos',icon:'ti-wallet',hint:'<strong>Cosmos Hub address</strong>'};
  if(/^osmo1[a-z0-9]{38}$/.test(h))
    return{mode:'address',addrType:'osmosis',icon:'ti-wallet',hint:'<strong>Osmosis address</strong>'};
  if(/^inj1[a-z0-9]{38}$/.test(h))
    return{mode:'address',addrType:'injective',icon:'ti-wallet',hint:'<strong>Injective address</strong>'};
  if(/^celestia1[a-z0-9]{38}$/.test(h))
    return{mode:'address',addrType:'celestia',icon:'ti-wallet',hint:'<strong>Celestia address</strong>'};
  if(/^dydx1[a-z0-9]{38}$/.test(h))
    return{mode:'address',addrType:'dydx',icon:'ti-wallet',hint:'<strong>dYdX address</strong>'};
  if(/^0x[0-9a-fA-F]{40}$/.test(h))
    return{mode:'address',addrType:'evm',icon:'ti-wallet',
      hint:'<strong>EVM wallet address</strong> — checking all 14 EVM chains for activity'};
  if(/^T[1-9A-HJ-NP-Za-km-z]{33}$/.test(h))
    return{mode:'address',addrType:'tron',icon:'ti-wallet',hint:'<strong>Tron address</strong>'};
  if(/^r[1-9A-HJ-NP-Za-km-z]{24,34}$/.test(h))
    return{mode:'address',addrType:'xrp',icon:'ti-wallet',hint:'<strong>Ripple (XRP) address</strong>'};
  if(/^G[A-Z2-7]{55}$/.test(h))
    return{mode:'address',addrType:'stellar',icon:'ti-wallet',hint:'<strong>Stellar address</strong>'};
  if(/^(tz[123]|KT1)[1-9A-HJ-NP-Za-km-z]{33}$/.test(h))
    return{mode:'address',addrType:'tezos',icon:'ti-wallet',hint:'<strong>Tezos address</strong>'};
  if(/^(nano|xrb)_[13][13456789abcdefghijkmnopqrstuwxyz]{59}$/.test(h))
    return{mode:'address',addrType:'nano',icon:'ti-wallet',hint:'<strong>Nano address</strong>'};
  if(/^addr1[a-z0-9]{50,120}$/.test(h))
    return{mode:'address',addrType:'cardano',icon:'ti-wallet',hint:'<strong>Cardano address</strong>'};
  if(/^(EQ|UQ)[A-Za-z0-9_-]{46}$/.test(h))
    return{mode:'address',addrType:'ton',icon:'ti-wallet',hint:'<strong>TON address</strong>'};
  if(/^bc1[ac-hj-np-z02-9]{6,90}$/i.test(h))
    return{mode:'address',addrType:'bitcoin',icon:'ti-wallet',hint:'<strong>Bitcoin address</strong> (bech32)'};
  if(/^ltc1[ac-hj-np-z02-9]{6,90}$/i.test(h))
    return{mode:'address',addrType:'litecoin',icon:'ti-wallet',hint:'<strong>Litecoin address</strong> (bech32)'};
  if(/^D[1-9A-HJ-NP-Za-km-z]{32,34}$/.test(h))
    return{mode:'address',addrType:'dogecoin',icon:'ti-wallet',hint:'<strong>Dogecoin address</strong>'};
  if(/^[LM][1-9A-HJ-NP-Za-km-z]{25,34}$/.test(h))
    return{mode:'address',addrType:'litecoin',icon:'ti-wallet',hint:'<strong>Litecoin address</strong>'};
  if(/^(bitcoincash:)?[qp][0-9a-z]{41}$/.test(h))
    return{mode:'address',addrType:'bch',icon:'ti-wallet',hint:'<strong>Bitcoin Cash address</strong> (cashaddr)'};
  if(/^[a-z0-9_.-]{2,64}\.(near|testnet)$/.test(h))
    return{mode:'address',addrType:'near',icon:'ti-wallet',hint:'<strong>NEAR address</strong>'};
  if(/^[48][1-9A-HJ-NP-Za-km-z]{93,105}$/.test(h))
    return{mode:'address',addrType:'monero',icon:'ti-wallet',hint:'<strong>Monero address</strong> — privacy chain, limited info'};
  // Polkadot SS58 (47-48 chars starting with 1) — check BEFORE Bitcoin legacy
  if(/^1[1-9A-HJ-NP-Za-km-z]{46,47}$/.test(h))
    return{mode:'address',addrType:'polkadot',icon:'ti-wallet',hint:'<strong>Polkadot address</strong> (SS58)'};
  // Bitcoin/BSV/BCD legacy (1 or 3, 25-34 chars)
  if(/^[13][1-9A-HJ-NP-Za-km-z]{24,34}$/.test(h))
    return{mode:'address',addrType:'bitcoin_legacy',icon:'ti-wallet',
      hint:'<strong>Bitcoin-format address</strong> — checking Bitcoin, BSV, and Bitcoin Diamond'};
  // Solana-like base58 (32-44 chars)
  if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(h))
    return{mode:'address',addrType:'solana',icon:'ti-wallet',hint:'<strong>Likely Solana address</strong>'};

  /* ── Transaction hashes ── */
  if(/^[A-Za-z0-9+/_-]{43,44}={0,2}$/.test(h)&&!/^[0-9a-fA-F]+$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Base64 format</strong> — likely TON'};
  if(h.startsWith('0x')&&h.length===66)
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>EVM / Aptos tx format</strong> — Ethereum, BSC, Polygon, Aptos, etc.'};
  if(/^[0-9a-fA-F]{64}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>64-char hex</strong> — Bitcoin, Litecoin, Monero, MultiversX, XRP, Cardano, etc.'};
  // Hedera tx ID: 0.0.{num}@{secs}.{nanos}
  if(/^\d+\.\d+\.\d+[@-]\d+[.-]\d+$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Hedera transaction ID</strong>'};
  // Algorand tx: 52-char uppercase base32
  if(/^[A-Z2-7]{52}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Algorand transaction ID</strong>'};
  if(/^o[1-9A-HJ-NP-Za-km-z]{49,53}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Tezos operation hash</strong>'};
  if(/^[1-9A-HJ-NP-Za-km-z]{85,90}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Likely Solana transaction signature</strong>'};
  // 44-char base58: Sui tx digest OR Solana address — route as tx (Sui), note ambiguity
  if(/^[1-9A-HJ-NP-Za-km-z]{44}$/.test(h))
    return{mode:'tx',icon:'ti-info-circle',hint:'<strong>Sui transaction digest</strong> or Solana address — searching as transaction'};

  return{mode:'tx',icon:'ti-info-circle',hint:null};
}

const ERC20_TOPIC='0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';
async function fetchTokenInfo(addr,rpc){
  const call=sel=>JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:addr,data:sel},'latest']});
  const opts={method:'POST',headers:{'Content-Type':'application/json'},signal:abortIn(5000)};
  try{
    const[sr,dr]=await Promise.all([fetch(rpc,{...opts,body:call('0x95d89b41')}),fetch(rpc,{...opts,body:call('0x313ce567')})]);
    const sd=await sr.json(),dd=await dr.json();
    return{symbol:decodeABIString(sd.result)??addr.slice(0,8)+'…',decimals:dd.result&&dd.result!=='0x'?parseInt(dd.result,16):18};
  }catch{return{symbol:'???',decimals:18};}
}
async function parseEVMTokens(logs,rpc){
  if(!logs?.length)return[];
  const xfers=logs.filter(l=>l.topics?.[0]?.toLowerCase()===ERC20_TOPIC&&l.topics.length===3&&l.data&&l.data!=='0x'&&l.data.length>2);
  if(!xfers.length)return[];
  const uniq=[...new Set(xfers.map(l=>l.address.toLowerCase()))];
  const map={};
  await Promise.all(uniq.map(async a=>{map[a]=await fetchTokenInfo(a,rpc);}));
  return xfers.map(log=>{
    const ca=log.address.toLowerCase(),{symbol,decimals}=map[ca]||{symbol:'???',decimals:18};
    return{symbol,amount:formatTokenAmt(log.data,decimals),from:'0x'+log.topics[1].slice(-40),to:'0x'+log.topics[2].slice(-40),contractAddr:ca};
  });
}

async function addrEVM(address,chain){
  const body=(m,p,i)=>JSON.stringify({jsonrpc:'2.0',id:i,method:m,params:p});
  const opts={method:'POST',headers:{'Content-Type':'application/json'},signal:abortIn(6000)};
  const[br,tr,cr]=await Promise.all([
    fetch(chain.rpc,{...opts,body:body('eth_getBalance',[address,'latest'],1)}),
    fetch(chain.rpc,{...opts,body:body('eth_getTransactionCount',[address,'latest'],2)}),
    fetch(chain.rpc,{...opts,body:body('eth_getCode',[address,'latest'],3)}),
  ]);
  const bd=await br.json(),td=await tr.json(),cd=await cr.json();
  const balWei=BigInt(bd.result??'0x0'),txCount=parseInt(td.result??'0x0',16);
  const code=cd.result??'0x';
  const isContract=code!=='0x'&&code!=='0x0'&&code.length>4;
  // Show contract addresses even with zero balance (they might just hold tokens)
  if(!isContract&&balWei===0n&&txCount===0)return null;
  return{
    balance:`${(Number(balWei)/1e18).toFixed(6)} ${chain.symbol}`,
    txCount,isContract,
    accountType:isContract?'Smart contract':'Externally owned account',
    explorerUrl:chain.addrExplorer+address,
  };
}

/* ══════════════════════════════════════════════
   SEARCH ORCHESTRATORS
══════════════════════════════════════════════ */
async function runTxSearch(hash){
  appMode='tx'; activeChains=CHAINS;
  CHAINS.forEach(c=>{statuses[c.id]='searching';});
  render();
  await Promise.allSettled(CHAINS.map(async chain=>{
    try{
      const r=await dispatchTxSearch(chain,hash);
      statuses[chain.id]=r?'found':'not_found';
      if(r){
        results[chain.id]=r;
        render();
        // Non-blocking: fetch USD price and patch result when ready
        if(r.blockTime?.secs){
          fetchAndApplyUSD(chain.id,r);
          if(r.tokenTransfers?.length)fetchAndApplyTokenTransferUSD(chain.id,r);
        }
        // Non-blocking: on-demand labels for from/to addresses
        if(chain.type==='evm'||chain.type==='tron'){
          if(r.from) applyOnDemandLabel(r.from,chain.id);
          if(r.to&&r.to!=='Contract creation') applyOnDemandLabel(r.to,chain.id);
        }
      }
    }
    catch{statuses[chain.id]='error';}
    render();
  }));
}
async function runAddrSearch(address,addrType){
  const chains=chainsForAddrType(addrType);
  appMode='address'; activeChains=chains;
  chains.forEach(c=>{statuses[c.id]='searching';});
  render();
  await Promise.allSettled(chains.map(async chain=>{
    try{const r=await dispatchAddrSearch(chain,address,addrType);
      statuses[chain.id]=r?'found':'not_found';
      if(r){
        results[chain.id]=r;
        // Non-blocking: on-demand label + token balances for EVM chains
        if(chain.type==='evm'){
          applyOnDemandLabel(address,chain.id);
          fetchAndApplyTokenBalances(chain.id,address,chain.rpc);
        }
      }
    }
    catch{statuses[chain.id]='error';}
    render();
  }));
}

function fmtGwei(g){
  if(g===null||g===undefined)return'—';
  if(g<0.001)return'<0.001';
  if(g<1)return g.toFixed(3).replace(/\.?0+$/,'');
  if(g<10)return g.toFixed(2).replace(/\.?0+$/,'');
  if(g<100)return g.toFixed(1).replace(/\.?0+$/,'');
  return Math.round(g).toLocaleString();
}
async function fetchChainGas(chain){
  try{
    const r=await fetch(chain.rpc,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_feeHistory',params:[10,'pending',[10,50,90]]}),
      signal:abortIn(7000)});
    const d=await r.json();const fh=d.result;
    if(fh?.baseFeePerGas?.length){
      const base=parseInt(fh.baseFeePerGas[fh.baseFeePerGas.length-1],16);
      const rewards=fh.reward??[];
      const tip=(pi)=>{if(!rewards.length)return 0;
        const t=rewards.map(b=>parseInt(b[pi]??'0x0',16)).sort((a,b)=>a-b);
        return t[Math.floor(t.length/2)];};
      return{baseFee:base/1e9,slow:(base+tip(0))/1e9,standard:(base+tip(1))/1e9,fast:(base+tip(2))/1e9,eip1559:true};
    }
  }catch{}
  try{
    const r=await fetch(chain.rpc,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_gasPrice',params:[]}),signal:abortIn(7000)});
    const d=await r.json();
    if(d.result){const p=parseInt(d.result,16)/1e9;
      return{baseFee:null,slow:p*0.85,standard:p,fast:p*1.2,eip1559:false};}
  }catch{}
  return null;
}
async function fetchGasPrices(){
  try{
    const ids=[...new Set(GAS_CHAINS.map(c=>c.coinId))].join(',');
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`,{signal:abortIn(9000)});
    if(!r.ok)return{};return await r.json();
  }catch{return{};}
}

  const[pr,...gr]=await Promise.allSettled([fetchGasPrices(),...GAS_CHAINS.map(c=>fetchChainGas(c))]);
  if(pr.status==='fulfilled')gasPrices=pr.value;
  GAS_CHAINS.forEach((c,i)=>{gasData[c.id]=gr[i].status==='fulfilled'?gr[i].value:null;});
  gasLastUpdate=Date.now();gasLoading=false;
  if(activeTab==='gas')renderGasTracker();
}

function fmtPrice(p){
  if(p===null||p===undefined)return'—';
  if(p>=10000)return`$${Math.round(p).toLocaleString()}`;
  if(p>=1000)return`$${p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  if(p>=1)return`$${p.toFixed(2)}`;
  if(p>=0.01)return`$${p.toFixed(4)}`;
  if(p>=0.0001)return`$${p.toFixed(6)}`;
  return`$${p.toFixed(8)}`;
}
function setPriceMode(mode){priceMode=mode;priceHistData={};refreshPrices();}

async function refreshPrices(){
  if(priceLoading)return;
  priceLoading=true;if(activeTab==='prices')renderPricesPanel();
  if(priceMode==='current'){
    const ids=PRICE_COINS.map(c=>COINGECKO_IDS[c.s]).filter(Boolean).join(',');
    try{
      const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`,{signal:abortIn(12000)});
      if(r.ok)priceData=await r.json();
    }catch{}
  }else{
    await loadHistoricalPrices(priceDate||new Date().toISOString().split('T')[0]);
    priceLoading=false;priceLastUpdate=Date.now();if(activeTab==='prices')renderPricesPanel();return;
  }
  priceLoading=false;priceLastUpdate=Date.now();if(activeTab==='prices')renderPricesPanel();
}
async function loadHistoricalPrices(dateStr){
  priceDate=dateStr;priceLoading=true;if(activeTab==='prices')renderPricesPanel();
  const secs=new Date(dateStr+'T12:00:00Z').getTime()/1000;
  const res=await Promise.allSettled(PRICE_COINS.map(c=>fetchHistoricalUSD(c.s,secs)));
  priceHistData={};
  PRICE_COINS.forEach((c,i)=>{
    const id=COINGECKO_IDS[c.s];
    if(res[i].status==='fulfilled'&&res[i].value!==null&&id)priceHistData[id]=res[i].value;
  });
  priceLoading=false;priceLastUpdate=Date.now();if(activeTab==='prices')renderPricesPanel();
}

/* ══════════════════════════════════════════════
   WATCH FOR CONFIRMATION
══════════════════════════════════════════════ */
function startWatching(){
  if(watchTimer)stopWatching();
  watchedTx=currentInput;
  watchedChains=activeChains.filter(c=>statuses[c.id]==='found'&&results[c.id]&&!results[c.id].confirmed);
  if(!watchedChains.length)return;
  watchCountdown=30;
  watchCountdownTimer=setInterval(()=>{
    watchCountdown=Math.max(0,watchCountdown-1);
    const el=document.getElementById('watchCountdown');
    if(el)el.textContent=watchCountdown;
  },1000);
  watchTimer=setInterval(pollWatchedTx,30000);
  render();
}
function stopWatching(){
  clearInterval(watchTimer);clearInterval(watchCountdownTimer);
  watchTimer=watchCountdownTimer=null;
  watchedTx=null;watchedChains=[];watchCountdown=0;
}
async function pollWatchedTx(){
  if(!watchedTx||!watchedChains.length){stopWatching();render();return;}
  await Promise.allSettled(watchedChains.map(async chain=>{
    try{
      const r=await dispatchTxSearch(chain,watchedTx);
      if(r){results[chain.id]=r;if(r.blockTime?.secs)fetchAndApplyUSD(chain.id,r);}
    }catch{}
  }));
  watchedChains=watchedChains.filter(c=>results[c.id]&&!results[c.id].confirmed);
  watchCountdown=30;
  if(!watchedChains.length)stopWatching();
  render();
}
function renderWatchBanner(){
  const pending=activeChains.filter(c=>statuses[c.id]==='found'&&results[c.id]&&!results[c.id].confirmed);
  if(!pending.length)return'';
  if(watchTimer)return`<div class="watch-banner active">
    <i class="ti ti-loader-2 spin" style="color:var(--warning)"></i>
    <span style="flex:1;font-size:12px;color:var(--text2)">Watching ${watchedChains.length} chain${watchedChains.length!==1?'s':''} for confirmation · next check in <span id="watchCountdown">${watchCountdown}</span>s</span>
    <button class="watch-btn stop" onclick="stopWatching();render()"><i class="ti ti-player-stop"></i> Stop</button>
  </div>`;
  return`<div class="watch-banner">
    <i class="ti ti-clock" style="color:var(--ts)"></i>
    <span style="flex:1;font-size:12px;color:var(--text2)">${pending.length} chain${pending.length!==1?'s show':' shows'} this transaction as pending</span>
    <button class="watch-btn" onclick="startWatching()"><i class="ti ti-refresh"></i> Auto-refresh</button>
  </div>`;
}

  if(activeTab==='gas'){renderGasTracker();return;}
  if(activeTab==='prices'){renderPricesPanel();return;}
  const app=document.getElementById('app');
  if(appMode==='idle'){app.innerHTML=renderWelcome();return;}
  // Resolution error: show error without a chain grid
  if(resolutionError){
    const modeBadge=`<div class="mode-badge addr-mode"><i class="ti ti-world"></i> Domain lookup</div>`;
    app.innerHTML=modeBadge+renderEmpty();return;
  }
  const modeBadge=appMode==='address'
    ?`<div class="mode-badge addr-mode"><i class="ti ti-wallet"></i> Address lookup</div>`
    :`<div class="mode-badge tx-mode"><i class="ti ti-arrows-exchange"></i> Transaction lookup</div>`;
  const grid=renderChainGrid();
  const cards=appMode==='address'?renderAddrCards():renderTxCards();
  app.innerHTML=modeBadge+grid+cards+renderEmpty();
}

/* ══════════════════════════════════════════════
   EVENT WIRING
══════════════════════════════════════════════ */
const hashInput=document.getElementById('hashInput');
const searchBtn=document.getElementById('searchBtn');
const shareBtn=document.getElementById('shareBtn');
const hintBox=document.getElementById('hintBox');
const hintIcon=document.getElementById('hintIcon');
const hintText=document.getElementById('hintText');

hashInput.addEventListener('input',()=>{
  if(activeTab==='gas')switchTab('lookup');
  const h=hashInput.value.trim();
  searchBtn.disabled=!h||searching;
  shareBtn.style.display='none';
  const det=h?detectInput(h):null;
  if(det?.hint){
    hintBox.className=`hint ${det.mode==='address'?'addr-hint':'tx-hint'}`;
    hintIcon.className=`ti ${det.icon}`;
    hintText.innerHTML=det.hint;
    hintBox.style.display='flex';
  }else{hintBox.style.display='none';}
});
hashInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchBtn.click();});

searchBtn.addEventListener('click',async()=>{
  const input=hashInput.value.trim();
  if(!input||searching)return;
  stopWatching();
  searching=true;searchBtn.disabled=true;shareBtn.style.display='none';
  statuses={};results={};resolutionError='';resolvedDomain='';currentInput=input;

  const det=detectInput(input);

  if(det?.mode==='address'&&(det.addrType==='ens'||det.addrType==='ud')){
    searchBtn.innerHTML=`<i class="ti ti-loader-2 spin"></i> <span>Resolving…</span>`;
    resolvedDomain=input;
    const resolved=det.addrType==='ens'?await resolveENS(input):await resolveUD(input);
    if(!resolved){
      resolutionError=`Could not resolve "${input}" — domain may not exist or the resolver is temporarily unavailable.`;
      appMode='address';activeChains=[];
      searching=false;searchBtn.disabled=false;
      searchBtn.innerHTML=`<i class="ti ti-search"></i> <span>Search</span>`;
      render();return;
    }
    currentInput=resolved;
    searchBtn.innerHTML=`<i class="ti ti-loader-2 spin"></i> <span>Searching…</span>`;
    await runAddrSearch(resolved,'evm');
  }else if(det?.mode==='address'){
    searchBtn.innerHTML=`<i class="ti ti-loader-2 spin"></i> <span>Searching…</span>`;
    await runAddrSearch(input,det.addrType);
  }else{
    searchBtn.innerHTML=`<i class="ti ti-loader-2 spin"></i> <span>Searching…</span>`;
    await runTxSearch(input);
  }

  // Save to history
  const matched=activeChains.filter(c=>statuses[c.id]==='found').map(c=>c.id);
  saveHistory({
    input,
    mode:resolvedDomain?'domain':appMode,
    timestamp:Date.now(),
    matched,
    resolvedDomain:resolvedDomain||'',
  });

  // Update URL so this search is shareable
  const url=new URL(window.location.href);
  url.searchParams.set('q',input);
  window.history.pushState({q:input},'',url);

  // Show share button
  shareBtn.style.display='flex';

  searching=false;searchBtn.disabled=false;
  searchBtn.innerHTML=`<i class="ti ti-search"></i> <span>Search</span>`;
  render();
});

/* Share button: copies current URL to clipboard */
shareBtn.addEventListener('click',async()=>{
  try{
    await navigator.clipboard.writeText(window.location.href);
    const icon=shareBtn.querySelector('i'),lbl=shareBtn.querySelector('span');
    const oi=icon.className,ol=lbl.textContent;
    shareBtn.classList.add('copied');icon.className='ti ti-check';lbl.textContent='Copied!';
    setTimeout(()=>{shareBtn.classList.remove('copied');icon.className=oi;lbl.textContent=ol;},2000);
  }catch{}
});

/* Auto-run search from shareable URL on page load */
(()=>{
  const q=new URLSearchParams(window.location.search).get('q');
  if(q){hashInput.value=q;hashInput.dispatchEvent(new Event('input'));setTimeout(()=>searchBtn.click(),80);}
})();

/* Browser back/forward: restore previous search or return to welcome */
window.addEventListener('popstate',e=>{
  stopWatching();
  const q=e.state?.q??new URLSearchParams(window.location.search).get('q');
  if(q){hashInput.value=q;hashInput.dispatchEvent(new Event('input'));searchBtn.click();}
  else{
    appMode='idle';statuses={};results={};resolvedDomain='';resolutionError='';
    hashInput.value='';hintBox.style.display='none';shareBtn.style.display='none';
    searchBtn.disabled=true;render();
  }
});

render();

</script>
</body>
</html>
